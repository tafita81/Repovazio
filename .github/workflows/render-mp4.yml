name: Render MP4
on:
  workflow_dispatch:
    inputs:
      audio_url:
        description: 'URL do audio MP3'
        required: true
      pipeline_id:
        description: 'ID do pipeline'
        required: true
      title:
        description: 'Titulo do video'
        required: true
      style:
        description: 'Estilo'
        default: 'documentary'
      short_id:
        description: 'ID do short'
        default: ''

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Setup FFmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg python3-pip python3-pil inkscape

      - name: Generate background image
        env:
          STYLE: ${{ inputs.style }}
          TITLE: ${{ inputs.title }}
        run: |
          set -e
          python3 - <<'PYEOF'
          import os
          style = os.environ.get('STYLE','documentary')
          title = os.environ.get('TITLE','Psicologia')
          BG={'documentary':'#0a0a1a','cartoon':'#6c5ce7','cinematic_case':'#0d0d0d','shorts_vertical':'#000000','series_binge':'#0a0a1a','animated_slides':'#1a0d2e'}
          ACC={'documentary':'#9b59b6','cartoon':'#fdcb6e','cinematic_case':'#e74c3c','shorts_vertical':'#ff4757','series_binge':'#9b59b6','animated_slides':'#e056fd'}
          bg=BG.get(style,'#0a0a1a'); acc=ACC.get(style,'#9b59b6')
          is_short = style=='shorts_vertical'
          W,H = (1080,1920) if is_short else (1920,1080)
          tc = title[:60].replace('&','&amp;').replace('<','&lt;').replace('>','&gt;')
          fs = W//22 if len(title)>40 else W//18
          svg = f"""<svg xmlns='http://www.w3.org/2000/svg' width='{W}' height='{H}'>
            <defs>
              <linearGradient id='g' x1='0%' y1='0%' x2='100%' y2='100%'>
                <stop offset='0%' style='stop-color:{bg}'/>
                <stop offset='100%' style='stop-color:{bg}99'/>
              </linearGradient>
              <filter id='blur'><feGaussianBlur stdDeviation='40'/></filter>
            </defs>
            <rect width='{W}' height='{H}' fill='url(#g)'/>
            <circle cx='{W//2}' cy='{H//3}' r='{min(W,H)//4}' fill='{acc}' opacity='0.08' filter='url(#blur)'/>
            <circle cx='{W//4}' cy='{H*2//3}' r='{min(W,H)//5}' fill='{acc}' opacity='0.05' filter='url(#blur)'/>
            <text x='{W//2}' y='{H//10}' font-family='Arial Black,Arial' font-size='{W//60}' fill='{acc}' text-anchor='middle' letter-spacing='10' opacity='0.7'>PSICOLOGIA.DOC</text>
            <text x='{W//2}' y='{H//2}' font-family='Georgia,serif' font-size='{fs}' fill='white' text-anchor='middle' dominant-baseline='middle' font-weight='bold'>{tc}</text>
            <rect x='{W//2-80}' y='{H//2+W//15}' width='160' height='5' fill='{acc}' rx='3'/>
            <text x='{W//2}' y='{H*9//10}' font-family='Arial,sans-serif' font-size='{W//70}' fill='white' text-anchor='middle' opacity='0.4'>psicologia.doc</text>
          </svg>"""
          open('background.svg','w').write(svg)
          print(f'SVG {W}x{H} criado')
          PYEOF

      - name: Convert SVG to PNG
        env:
          STYLE: ${{ inputs.style }}
        run: |
          set -e
          if [ "$STYLE" = "shorts_vertical" ]; then W=1080; H=1920; else W=1920; H=1080; fi
          inkscape --export-type=png --export-filename=background.png --export-width=$W --export-height=$H background.svg 2>/dev/null || python3 -c "from PIL import Image; Image.new('RGB',($W,$H),'#0a0a1a').save('background.png')"
          ls -lh background.png

      - name: Download audio
        run: |
          set -e
          wget -q -O audio.mp3 '${{ inputs.audio_url }}'
          ls -lh audio.mp3

      - name: Get audio duration
        id: duration
        run: |
          set -e
          DURATION=$(ffprobe -v quiet -show_entries format=duration -of csv=p=0 audio.mp3 | head -1)
          echo "duration=$DURATION" >> $GITHUB_OUTPUT
          echo "Duration: $DURATION s"

      - name: Render MP4
        run: |
          set -e
          STYLE='${{ inputs.style }}'
          if [ "$STYLE" = "shorts_vertical" ]; then VF="scale=1080:1920,setsar=1"; else VF="scale=1920:1080,setsar=1"; fi
          ffmpeg -y -loop 1 -framerate 1 -i background.png -i audio.mp3 -vf "$VF" -c:v libx264 -preset ultrafast -tune stillimage -pix_fmt yuv420p -c:a aac -b:a 128k -shortest -movflags +faststart output.mp4
          ls -lh output.mp4

      - name: Upload MP4 and PATCH database
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PIPELINE_ID: ${{ inputs.pipeline_id }}
          SHORT_ID: ${{ inputs.short_id }}
          TITLE: ${{ inputs.title }}
        run: |
          set -e
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_KEY" ]; then
            echo "ERRO: secrets ausentes"; exit 1
          fi
          SAFE_TITLE=$(echo "$TITLE" | tr ' ' '_' | tr -cd '[:alnum:]_' | head -c 30)
          TS=$(date +%s)
          FILENAME="${TS}_${SAFE_TITLE}.mp4"
          MP4_URL="$SUPABASE_URL/storage/v1/object/public/videos/$FILENAME"
          echo "⬆️  Uploading videos/$FILENAME"
          UP_HTTP=$(curl -s -o /tmp/up.json -w "%{http_code}" \
            -X POST "$SUPABASE_URL/storage/v1/object/videos/$FILENAME" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: video/mp4" \
            -H "x-upsert: true" \
            --data-binary @output.mp4)
          echo "Upload HTTP: $UP_HTTP"
          cat /tmp/up.json 2>/dev/null || true
          echo
          if [ "$UP_HTTP" -lt 200 ] || [ "$UP_HTTP" -ge 300 ]; then
            echo "❌ Upload failed"; exit 1
          fi
          echo "✅ MP4_URL=$MP4_URL"
          # Gerar JSON via heredoc (sem escape hell)
          cat > /tmp/patch.json <<JSON_EOF
          {"mp4_url":"$MP4_URL","status":"mp4_ready"}
          JSON_EOF
          echo "📝 JSON body:"
          cat /tmp/patch.json
          if [ -n "$PIPELINE_ID" ]; then
            P_HTTP=$(curl -s -o /tmp/p.json -w "%{http_code}" \
              -X PATCH "$SUPABASE_URL/rest/v1/content_pipeline?id=eq.$PIPELINE_ID" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
              -H "apikey: $SUPABASE_SERVICE_KEY" \
              -H "Content-Type: application/json" \
              -H "Prefer: return=representation" \
              --data @/tmp/patch.json)
            echo "Pipeline $PIPELINE_ID PATCH HTTP: $P_HTTP"
            cat /tmp/p.json 2>/dev/null || true
            echo
            if [ "$P_HTTP" -lt 200 ] || [ "$P_HTTP" -ge 300 ]; then
              echo "❌ PATCH content_pipeline failed"; exit 1
            fi
          fi
          if [ -n "$SHORT_ID" ]; then
            S_HTTP=$(curl -s -o /tmp/s.json -w "%{http_code}" \
              -X PATCH "$SUPABASE_URL/rest/v1/shorts_pipeline?id=eq.$SHORT_ID" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
              -H "apikey: $SUPABASE_SERVICE_KEY" \
              -H "Content-Type: application/json" \
              -H "Prefer: return=minimal" \
              --data @/tmp/patch.json)
            echo "Short $SHORT_ID PATCH HTTP: $S_HTTP"
          fi
          echo "🚀 Trigger publisher"
          curl -s -X POST "$SUPABASE_URL/functions/v1/youtube-publisher" \
            -H "Content-Type: application/json" \
            -d '{"action":"publish_pending"}' || true
          echo "✅ Done"
