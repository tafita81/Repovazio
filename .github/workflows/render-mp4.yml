name: Render MP4
on:
  workflow_dispatch:
    inputs:
      audio_url:
        description: 'URL do áudio MP3'
        required: true
      pipeline_id:
        description: 'ID do pipeline'
        required: true
      title:
        description: 'Título do vídeo'
        required: true
      style:
        description: 'Estilo: documentary|cartoon|cinematic_case|shorts_vertical|series_binge'
        default: 'documentary'
      short_id:
        description: 'ID do short (opcional)'
        default: ''

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Setup FFmpeg
        run: sudo apt-get install -y ffmpeg python3-pip python3-pil

      - name: Generate background image
        run: |
          python3 << 'PYEOF'
          import os, base64
          style = os.environ.get('STYLE', 'documentary')
          title = os.environ.get('TITLE', 'Psicologia')
          BG = {'documentary':'#0a0a1a','cartoon':'#6c5ce7','cinematic_case':'#0d0d0d','shorts_vertical':'#000000','series_binge':'#0a0a1a'}
          ACC = {'documentary':'#9b59b6','cartoon':'#fdcb6e','cinematic_case':'#e74c3c','shorts_vertical':'#ff4757','series_binge':'#9b59b6'}
          bg = BG.get(style, '#0a0a1a')
          acc = ACC.get(style, '#9b59b6')
          is_short = style == 'shorts_vertical'
          W, H = (1080, 1920) if is_short else (1920, 1080)
          title_clean = title[:60].replace('&','&amp;').replace('<','&lt;').replace('>','&gt;')
          svg = f'''<svg xmlns='http://www.w3.org/2000/svg' width='{W}' height='{H}'>
          <defs>
            <linearGradient id='g' x1='0%' y1='0%' x2='100%' y2='100%'>
              <stop offset='0%' style='stop-color:{bg}'/>
              <stop offset='50%' style='stop-color:{bg}dd'/>
              <stop offset='100%' style='stop-color:{bg}99'/>
            </linearGradient>
            <filter id='blur'><feGaussianBlur stdDeviation='40'/></filter>
          </defs>
          <rect width='{W}' height='{H}' fill='url(#g)'/>
          <circle cx='{W//2}' cy='{H//3}' r='{min(W,H)//4}' fill='{acc}' opacity='0.08' filter='url(#blur)'/>
          <circle cx='{W//4}' cy='{H*2//3}' r='{min(W,H)//5}' fill='{acc}' opacity='0.05' filter='url(#blur)'/>
          <text x='{W//2}' y='{H//10}' font-family='Arial Black,Arial' font-size='{W//60}' fill='{acc}' text-anchor='middle' letter-spacing='10' opacity='0.7'>PSICOLOGIA.DOC</text>
          <text x='{W//2}' y='{H//2}' font-family='Georgia,serif' font-size='{W//22 if len(title)>40 else W//18}' fill='white' text-anchor='middle' dominant-baseline='middle' font-weight='bold'>{title_clean}</text>
          <rect x='{W//2-80}' y='{H//2+W//15}' width='160' height='5' fill='{acc}' rx='3'/>
          <text x='{W//2}' y='{H*9//10}' font-family='Arial,sans-serif' font-size='{W//70}' fill='white' text-anchor='middle' opacity='0.4'>psicologia.doc</text>
          </svg>'''
          with open('background.svg', 'w') as f: f.write(svg)
          print(f'SVG criado: {W}x{H}')
          PYEOF
        env:
          STYLE: ${{ inputs.style }}
          TITLE: ${{ inputs.title }}

      - name: Convert SVG to PNG
        run: |
          sudo apt-get install -y inkscape
          inkscape --export-type=png --export-filename=background.png --export-width=1920 --export-height=1080 background.svg 2>/dev/null ||           ffmpeg -i background.svg background.png 2>/dev/null ||           python3 -c "
          from PIL import Image, ImageDraw, ImageFont
          import os
          style = os.environ.get('STYLE', 'documentary')
          is_short = style == 'shorts_vertical'
          W, H = (1080, 1920) if is_short else (1920, 1080)
          img = Image.new('RGB', (W, H), '#0a0a1a')
          img.save('background.png')
          print('PNG fallback criado')
          "
        env:
          STYLE: ${{ inputs.style }}

      - name: Download audio
        run: |
          wget -q -O audio.mp3 '${{ inputs.audio_url }}'
          echo "Audio baixado: $(ls -lh audio.mp3 | awk '{print $5}')"

      - name: Get audio duration
        id: duration
        run: |
          DURATION=$(ffprobe -v quiet -print_format compact=print_wrappers=0:nokey=1 -show_entries format=duration audio.mp3 2>/dev/null | head -1)
          echo "duration=$DURATION" >> $GITHUB_OUTPUT
          echo "Audio duration: ${DURATION}s"

      - name: Render MP4
        run: |
          DURATION='${{ steps.duration.outputs.duration }}'
          STYLE='${{ inputs.style }}'
          if [ "$STYLE" = "shorts_vertical" ]; then
            VF="scale=1080:1920,setsar=1"
          else
            VF="scale=1920:1080,setsar=1"
          fi
          ffmpeg -y             -loop 1 -framerate 1 -i background.png             -i audio.mp3             -vf "$VF"             -c:v libx264 -preset ultrafast -tune stillimage -pix_fmt yuv420p             -c:a aac -b:a 128k             -shortest -movflags +faststart             output.mp4
          echo "MP4 renderizado: $(ls -lh output.mp4 | awk '{print $5}')"

      - name: Upload MP4 to Supabase Storage
        run: |
          PIPELINE_ID='${{ inputs.pipeline_id }}'
          SHORT_ID='${{ inputs.short_id }}'
          TITLE='${{ inputs.title }}'
          SAFE_TITLE=$(echo "$TITLE" | tr ' ' '_' | tr -cd '[a-zA-Z0-9_]' | head -c 30)
          TS=$(date +%s)
          FILENAME="${TS}_${SAFE_TITLE}.mp4"
          # Upload para Supabase Storage
          curl -s -X POST             "$SUPABASE_URL/storage/v1/object/videos/$FILENAME"             -H "Authorization: Bearer $SUPABASE_SERVICE_KEY"             -H "Content-Type: video/mp4"             --data-binary @output.mp4
          MP4_URL="$SUPABASE_URL/storage/v1/object/public/videos/$FILENAME"
          echo "MP4 URL: $MP4_URL"
          # Atualizar pipeline no banco
          if [ -n "$PIPELINE_ID" ]; then
            curl -s -X PATCH               "$SUPABASE_URL/rest/v1/content_pipeline?id=eq.$PIPELINE_ID"               -H "Authorization: Bearer $SUPABASE_SERVICE_KEY"               -H "apikey: $SUPABASE_SERVICE_KEY"               -H "Content-Type: application/json"               -H "Prefer: return=minimal"               -d "{"mp4_url":"$MP4_URL","status":"mp4_ready"}"
            echo "Pipeline $PIPELINE_ID atualizado com MP4"
          fi
          if [ -n "$SHORT_ID" ]; then
            curl -s -X PATCH               "$SUPABASE_URL/rest/v1/shorts_pipeline?id=eq.$SHORT_ID"               -H "Authorization: Bearer $SUPABASE_SERVICE_KEY"               -H "apikey: $SUPABASE_SERVICE_KEY"               -H "Content-Type: application/json"               -H "Prefer: return=minimal"               -d "{"mp4_url":"$MP4_URL","status":"mp4_ready"}"
            echo "Short $SHORT_ID atualizado com MP4"
          fi
          # Acionar publisher
          curl -s -X POST             "$SUPABASE_URL/functions/v1/youtube-publisher"             -H "Content-Type: application/json"             -d "{"action":"publish_pending"}"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
