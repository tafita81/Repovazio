name: Render MP4 v8 Cinematic

on:
  workflow_dispatch:
    inputs:
      audio_url:
        description: 'URL do audio MP3 (narracao TTS)'
        required: true
      pipeline_id:
        description: 'ID do pipeline'
        required: true
      title:
        description: 'Titulo do video'
        required: true
      style:
        description: 'Estilo: documentary|cinematic_case|shorts_vertical|series_binge'
        default: 'documentary'
      short_id:
        description: 'ID do short (opcional)'
        default: ''
      video_html_url:
        description: 'URL do HTML cinematografico (do video-generator). Vazio = fallback SVG 30fps'
        default: ''
      music_url:
        description: 'URL musica de fundo (opcional, mixada -16dB)'
        default: ''

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Setup deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg python3-pil inkscape

      - name: Setup Playwright (only if HTML URL given)
        if: inputs.video_html_url != ''
        run: |
          npm init -y >/dev/null
          npm install playwright@1.47.0 --silent
          npx playwright install chromium --with-deps 2>&1 | tail -3

      - name: Download audio
        run: |
          wget -q -O audio.mp3 "${{ inputs.audio_url }}"
          ls -lh audio.mp3

      - name: Download music (opcional)
        env:
          MUSIC_URL: ${{ inputs.music_url }}
        run: |
          if [ -n "$MUSIC_URL" ] && [[ "$MUSIC_URL" != placeholder* ]]; then
            wget -q -O music.mp3 "$MUSIC_URL" --timeout=10 || rm -f music.mp3
            [ -f music.mp3 ] && ls -lh music.mp3
          fi

      - name: Get audio duration
        id: duration
        run: |
          DURATION=$(ffprobe -v quiet -show_entries format=duration -of csv=p=0 audio.mp3 | head -1)
          DURATION_INT=$(printf "%.0f" "$DURATION")
          echo "duration=$DURATION_INT" >> $GITHUB_OUTPUT
          echo "Duracao audio: $DURATION s"

      - name: Download HTML (force as text)
        if: inputs.video_html_url != ''
        run: |
          curl -s -L -o video.html "${{ inputs.video_html_url }}"
          ls -lh video.html
          head -c 200 video.html
          echo

      - name: Patch HTML transitions (v8.3 fix - elimina overlap 1s entre cenas)
        if: inputs.video_html_url != ''
        run: |
          # Reduz transition opacity de 1s/.6s/1.2s/.5s pra 0.3s (transicao snappy)
          sed -i 's/transition:opacity [0-9.]*s/transition:opacity 0.3s/g' video.html
          # Verifica
          grep -o 'transition:opacity [0-9.]*s' video.html | sort -u | head -5 || echo "(no transition found - ok)"

      - name: Path A - Record HTML via Playwright (30fps)
        if: inputs.video_html_url != ''
        env:
          VIDEO_HTML_URL: ${{ inputs.video_html_url }}
          STYLE: ${{ inputs.style }}
          DUR: ${{ steps.duration.outputs.duration }}
        run: |
          cat > record.js << 'JSEOF'
          const { chromium } = require('playwright');
          (async () => {
            const url = process.env.VIDEO_HTML_URL;
            const dur = parseInt(process.env.DUR || '720');
            const style = process.env.STYLE || 'documentary';
            const isShort = style === 'shorts_vertical';
            const W = isShort ? 1080 : 1920;
            const H = isShort ? 1920 : 1080;
            console.log('Recording ' + url + ' at ' + W + 'x' + H + ' for ' + dur + 's');
            const browser = await chromium.launch({
              headless: true,
              args: ['--disable-web-security','--no-sandbox','--disable-setuid-sandbox','--disable-dev-shm-usage','--autoplay-policy=no-user-gesture-required']
            });
            const context = await browser.newContext({
              viewport: { width: W, height: H },
              recordVideo: { dir: '.', size: { width: W, height: H } }
            });
            const page = await context.newPage();
            page.on('pageerror', err => console.log('PAGE_ERROR:', err.message));
            // Baixar HTML como texto (Supabase serve como text/plain)
            const fs = require('fs');
            const html = fs.readFileSync('video.html', 'utf8');
            await page.setContent(html, { waitUntil: 'load', timeout: 60000 });
            await page.waitForTimeout(1500);
            await page.waitForTimeout((dur + 1) * 1000);
            await page.close();
            await context.close();
            await browser.close();
            console.log('Recording done');
          })().catch(e => { console.error(e); process.exit(1); });
          JSEOF
          timeout $((DUR + 90)) node record.js
          ls -lh *.webm 2>/dev/null
          WEBM=$(ls *.webm 2>/dev/null | head -1)
          [ -n "$WEBM" ] && mv "$WEBM" raw_video.webm
          [ -f raw_video.webm ] && echo "raw_video.webm OK ($(stat -c%s raw_video.webm) bytes)"

      - name: Path B - Generate static SVG fallback
        if: inputs.video_html_url == ''
        env:
          STYLE: ${{ inputs.style }}
          TITLE: ${{ inputs.title }}
        run: |
          python3 << 'PYEOF'
          import os
          style = os.environ.get('STYLE','documentary')
          title = os.environ.get('TITLE','Psicologia')
          BG = {'documentary':'#0a0a1a','cinematic_case':'#0d0d0d','shorts_vertical':'#000000','series_binge':'#0a0a1a'}
          ACC = {'documentary':'#9b59b6','cinematic_case':'#e74c3c','shorts_vertical':'#ff4757','series_binge':'#9b59b6'}
          bg = BG.get(style,'#0a0a1a')
          acc = ACC.get(style,'#9b59b6')
          is_short = style == 'shorts_vertical'
          W, H = (1080, 1920) if is_short else (1920, 1080)
          tc = title[:80].replace('&','&amp;').replace('<','&lt;').replace('>','&gt;')
          fs = W // 22 if len(title) > 40 else W // 16
          svg = f'''<svg xmlns="http://www.w3.org/2000/svg" width="{W}" height="{H}">
          <defs>
            <radialGradient id="g" cx="50%" cy="40%" r="80%">
              <stop offset="0%" style="stop-color:{acc};stop-opacity:0.35"/>
              <stop offset="60%" style="stop-color:{bg}"/>
              <stop offset="100%" style="stop-color:#000"/>
            </radialGradient>
            <filter id="b"><feGaussianBlur stdDeviation="60"/></filter>
          </defs>
          <rect width="{W}" height="{H}" fill="url(#g)"/>
          <circle cx="{W//2}" cy="{H//3}" r="{min(W,H)//3}" fill="{acc}" opacity="0.10" filter="url(#b)"/>
          <circle cx="{W//4}" cy="{H*2//3}" r="{min(W,H)//4}" fill="{acc}" opacity="0.06" filter="url(#b)"/>
          <text x="{W//2}" y="{H//8}" font-family="Georgia,serif" font-size="{W//55}" fill="{acc}" text-anchor="middle" letter-spacing="10" opacity="0.8" font-weight="300">PSICOLOGIA.DOC</text>
          <text x="{W//2}" y="{H//2}" font-family="Georgia,serif" font-size="{fs}" fill="white" text-anchor="middle" dominant-baseline="middle" font-weight="bold">{tc}</text>
          <rect x="{W//2-100}" y="{H//2 + fs//2 + 30}" width="200" height="6" fill="{acc}" rx="3"/>
          <text x="{W//2}" y="{H*9//10}" font-family="Georgia,serif" font-size="{W//75}" fill="white" text-anchor="middle" opacity="0.5" letter-spacing="5">psicologia.doc</text>
          </svg>'''
          open('background.svg','w').write(svg)
          print(f'SVG {W}x{H} OK')
          PYEOF
          if [ "${{ inputs.style }}" = "shorts_vertical" ]; then
            W=1080; H=1920
          else
            W=1920; H=1080
          fi
          inkscape --export-type=png --export-filename=background.png --export-width=$W --export-height=$H background.svg 2>/dev/null
          if [ ! -f background.png ]; then
            python3 -c "from PIL import Image; Image.new('RGB',($W,$H),'#0a0a1a').save('background.png')"
          fi
          ls -lh background.png

      - name: Mix audio (narration + music) stereo 48kHz
        run: |
          if [ -f music.mp3 ]; then
            echo "Mixing narration + music"
            ffmpeg -y -i audio.mp3 -i music.mp3 \
              -filter_complex "[0:a]aresample=48000,volume=1.0[narr];[1:a]aresample=48000,volume=0.16,aloop=loop=-1:size=2e9[mus];[narr][mus]amix=inputs=2:duration=first:dropout_transition=2,loudnorm=I=-16:TP=-1.5:LRA=11" \
              -ar 48000 -ac 2 -c:a aac -b:a 192k mixed_audio.m4a
          else
            echo "Narration only stereo 48kHz"
            ffmpeg -y -i audio.mp3 \
              -af "aresample=48000,loudnorm=I=-16:TP=-1.5:LRA=11" \
              -ar 48000 -ac 2 -c:a aac -b:a 192k mixed_audio.m4a
          fi
          ls -lh mixed_audio.m4a

      - name: Render final MP4 1080p 30fps H.264 (dynamic CRF v8.4)
        env:
          DUR: ${{ steps.duration.outputs.duration }}
        run: |
          STYLE='${{ inputs.style }}'
          if [ "$STYLE" = "shorts_vertical" ]; then
            VF="scale=1080:1920:flags=lanczos,setsar=1,fps=30"
          else
            VF="scale=1920:1080:flags=lanczos,setsar=1,fps=30"
          fi
          # Dynamic CRF/preset based on duration (Supabase Free Storage 50MB limit per object)
          # Long (>5min): CRF 23 medium = ~3MB/min @ 1080p (16min approx 48MB, fits)
          # Short (<=5min): CRF 18 slow = qualidade extrema cabe folgada
          if [ "$DUR" -gt 300 ]; then
            CRF=23
            PRESET=medium
            ENC_TAG="libx264_crf23_medium"
          else
            CRF=18
            PRESET=slow
            ENC_TAG="libx264_crf18_slow"
          fi
          echo "Duration ${DUR}s -> CRF=$CRF preset=$PRESET"
          # Audio: vídeos longos usam 128k pra economizar espaço
          if [ "$DUR" -gt 300 ]; then
            ffmpeg -y -i mixed_audio.m4a -c:a aac -b:a 128k -ar 48000 -ac 2 mixed_audio_128.m4a
            AUDIO_FILE=mixed_audio_128.m4a
          else
            AUDIO_FILE=mixed_audio.m4a
          fi
          if [ -f raw_video.webm ]; then
            echo "Encoding cinematic HTML capture (Playwright webm)"
            ffmpeg -y -i raw_video.webm -i "$AUDIO_FILE" \
              -vf "$VF" \
              -c:v libx264 -preset "$PRESET" -crf "$CRF" -pix_fmt yuv420p -profile:v high -level 4.1 \
              -c:a copy -shortest -movflags +faststart \
              -metadata title="${{ inputs.title }}" \
              -metadata artist="psicologia.doc" \
              output.mp4
          else
            echo "Encoding fallback PNG estatico 30fps"
            ffmpeg -y -loop 1 -framerate 30 -i background.png -i "$AUDIO_FILE" \
              -vf "$VF" \
              -c:v libx264 -preset "$PRESET" -crf "$CRF" -pix_fmt yuv420p -profile:v high -level 4.1 -tune stillimage \
              -c:a copy -shortest -movflags +faststart \
              -metadata title="${{ inputs.title }}" \
              -metadata artist="psicologia.doc" \
              output.mp4
          fi
          ls -lh output.mp4
          # Hard guard: se >49MB re-encoda com CRF 28 pra caber em 50MB Storage Free
          SIZE=$(stat -c%s output.mp4)
          MAX_BYTES=$((49*1024*1024))
          echo "MP4 size: $SIZE bytes (limit $MAX_BYTES = 49MB)"
          if [ "$SIZE" -gt "$MAX_BYTES" ]; then
            echo "::warning::MP4 oversized, re-encoding CRF 28"
            mv output.mp4 output_oversized.mp4
            ffmpeg -y -i output_oversized.mp4 -c:v libx264 -preset medium -crf 28 -pix_fmt yuv420p \
              -c:a copy -movflags +faststart output.mp4
            ls -lh output.mp4
            ENC_TAG="libx264_crf28_recompressed"
          fi
          ffprobe -v quiet -show_streams output.mp4 | head -40
          echo "ENC_TAG=$ENC_TAG" >> $GITHUB_ENV


      - name: Upload to Supabase Storage + update DB
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PIPELINE_ID: ${{ inputs.pipeline_id }}
          SHORT_ID: ${{ inputs.short_id }}
          TITLE: ${{ inputs.title }}
          STYLE: ${{ inputs.style }}
        run: |
          set -e
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_KEY" ]; then
            echo "ERRO: secrets ausentes"; exit 1
          fi
          SAFE_TITLE=$(echo "$TITLE" | tr ' ' '_' | tr -cd '[:alnum:]_' | head -c 30)
          TS=$(date +%s)
          FILENAME="${TS}_${SAFE_TITLE}_v8.mp4"
          UP_HTTP=$(curl -s -o /tmp/up.json -w "%{http_code}" \
            -X POST "$SUPABASE_URL/storage/v1/object/videos/$FILENAME" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: video/mp4" \
            -H "x-upsert: true" \
            --data-binary @output.mp4)
          echo "Upload HTTP: $UP_HTTP"
          if [ "$UP_HTTP" != "200" ] && [ "$UP_HTTP" != "201" ] && [ "$UP_HTTP" != "409" ]; then
            cat /tmp/up.json; exit 1
          fi
          MP4_URL="$SUPABASE_URL/storage/v1/object/public/videos/$FILENAME"
          echo "MP4_URL=$MP4_URL"
          FILE_SIZE=$(stat -c%s output.mp4)
          DURATION=$(ffprobe -v quiet -show_entries format=duration -of csv=p=0 output.mp4)
          cat > /tmp/patch.json << JSON_EOF
          {"mp4_url":"$MP4_URL","status":"mp4_ready","video_style":"$STYLE","metadata":{"render_version":"v8_cinematic","fps":30,"resolution":"1080p","audio":"stereo_48k_192kbps","encoder":"'$ENC_TAG'","file_size":$FILE_SIZE,"duration_seconds":$DURATION}}
          JSON_EOF
          cat /tmp/patch.json
          if [ -n "$PIPELINE_ID" ] && [ "$PIPELINE_ID" != "999999" ]; then
            P_HTTP=$(curl -s -o /tmp/p.json -w "%{http_code}" \
              -X PATCH "$SUPABASE_URL/rest/v1/content_pipeline?id=eq.$PIPELINE_ID" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
              -H "apikey: $SUPABASE_SERVICE_KEY" \
              -H "Content-Type: application/json" \
              -H "Prefer: return=minimal" \
              --data @/tmp/patch.json)
            echo "Pipeline patch: $P_HTTP"
          fi
          if [ -n "$SHORT_ID" ]; then
            curl -s -X PATCH "$SUPABASE_URL/rest/v1/shorts_pipeline?id=eq.$SHORT_ID" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
              -H "apikey: $SUPABASE_SERVICE_KEY" \
              -H "Content-Type: application/json" \
              -H "Prefer: return=minimal" \
              --data @/tmp/patch.json
          fi
          echo "Done v8."
