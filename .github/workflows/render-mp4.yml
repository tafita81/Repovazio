name: Render MP4
on:
  workflow_dispatch:
    inputs:
      audio_url:
        required: true
      pipeline_id:
        required: true
      title:
        required: true
      style:
        default: 'documentary'
      short_id:
        default: ''
jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Setup tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg python3-pip python3-pil inkscape
      - name: Generate background
        env:
          STYLE: ${{ inputs.style }}
          TITLE: ${{ inputs.title }}
        run: |
          set -e
          python3 - <<'PY'
          import os
          s=os.environ.get('STYLE','documentary')
          t=os.environ.get('TITLE','Psicologia')
          BG={'documentary':'#0a0a1a','cartoon':'#6c5ce7','cinematic_case':'#0d0d0d','shorts_vertical':'#000000','series_binge':'#0a0a1a','animated_slides':'#1a0d2e'}
          AC={'documentary':'#9b59b6','cartoon':'#fdcb6e','cinematic_case':'#e74c3c','shorts_vertical':'#ff4757','series_binge':'#9b59b6','animated_slides':'#e056fd'}
          bg=BG.get(s,'#0a0a1a');ac=AC.get(s,'#9b59b6')
          W,H=(1080,1920) if s=='shorts_vertical' else (1920,1080)
          tc=t[:60].replace('&','&amp;').replace('<','&lt;').replace('>','&gt;')
          fs=W//22 if len(t)>40 else W//18
          svg=f"<svg xmlns='http://www.w3.org/2000/svg' width='{W}' height='{H}'><defs><linearGradient id='g' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' style='stop-color:{bg}'/><stop offset='100%' style='stop-color:{bg}99'/></linearGradient><filter id='blur'><feGaussianBlur stdDeviation='40'/></filter></defs><rect width='{W}' height='{H}' fill='url(#g)'/><circle cx='{W//2}' cy='{H//3}' r='{min(W,H)//4}' fill='{ac}' opacity='0.08' filter='url(#blur)'/><text x='{W//2}' y='{H//10}' font-family='Arial Black' font-size='{W//60}' fill='{ac}' text-anchor='middle' letter-spacing='10' opacity='0.7'>PSICOLOGIA.DOC</text><text x='{W//2}' y='{H//2}' font-family='Georgia' font-size='{fs}' fill='white' text-anchor='middle' dominant-baseline='middle' font-weight='bold'>{tc}</text><rect x='{W//2-80}' y='{H//2+W//15}' width='160' height='5' fill='{ac}' rx='3'/></svg>"
          open('bg.svg','w').write(svg)
          print(f'SVG {W}x{H}')
          PY
      - name: SVG to PNG
        env:
          STYLE: ${{ inputs.style }}
        run: |
          set -e
          if [ "$STYLE" = "shorts_vertical" ]; then W=1080; H=1920; else W=1920; H=1080; fi
          inkscape --export-type=png --export-filename=bg.png --export-width=$W --export-height=$H bg.svg
      - name: Audio
        run: |
          set -e
          wget -q -O audio.mp3 '${{ inputs.audio_url }}'
          ls -lh audio.mp3
      - name: Render MP4
        run: |
          set -e
          STYLE='${{ inputs.style }}'
          if [ "$STYLE" = "shorts_vertical" ]; then VF="scale=1080:1920,setsar=1"; else VF="scale=1920:1080,setsar=1"; fi
          ffmpeg -y -loop 1 -framerate 1 -i bg.png -i audio.mp3 -vf "$VF" -c:v libx264 -preset ultrafast -tune stillimage -pix_fmt yuv420p -c:a aac -b:a 128k -shortest -movflags +faststart out.mp4
          ls -lh out.mp4
      - name: Upload via Proxy
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          PIPELINE_ID: ${{ inputs.pipeline_id }}
          SHORT_ID: ${{ inputs.short_id }}
          TITLE: ${{ inputs.title }}
        run: |
          set -e
          SAFE=$(echo "$TITLE" | tr ' ' '_' | tr -cd '[:alnum:]_' | head -c 30)
          TS=$(date +%s)
          FN="${TS}_${SAFE}.mp4"
          URL="$SUPABASE_URL/functions/v1/mp4-upload?filename=$FN&pipeline_id=$PIPELINE_ID"
          if [ -n "$SHORT_ID" ]; then URL="$URL&short_id=$SHORT_ID"; fi
          echo "⏫ POST -> $URL"
          HTTP=$(curl -s -o resp.json -w "%{http_code}" -X POST "$URL" -H "Content-Type: application/octet-stream" --data-binary @out.mp4)
          echo "HTTP $HTTP"
          cat resp.json
          echo
          [ "$HTTP" = "200" ] || exit 1
          echo "✅ Done"
