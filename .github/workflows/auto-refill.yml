name: Auto-Refill (script_ready)
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */3 * * *'  # a cada 3h verifica fila

permissions:
  contents: read

jobs:
  refill:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Run auto-refill
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python3 scripts/auto_refill.py
