name: 9 Shorts PT-BR — Banco Viral Analisado

on:
  workflow_dispatch:
  schedule:
    - cron: "30 5,13,21 * * *"

jobs:
  render-9-shorts:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: |
          sudo apt-get install -y ffmpeg > /dev/null 2>&1
          pip install requests edge-tts --break-system-packages
      - name: Render 9 Shorts PT-BR
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python3 scripts/render_9_shorts_pt.py
        continue-on-error: true
