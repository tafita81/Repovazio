name: Trilhas Psicologia (Edge TTS GRATIS)

on:
  schedule:
    - cron: "0 */6 * * *"   # a cada 6h — custo zero
  workflow_dispatch:

jobs:
  trilhas:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install requests edge-tts --break-system-packages
      - name: Gerar trilhas (Edge TTS gratis, $0)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python3 scripts/elevenlabs_trilhas.py
