name: Podcast Pipeline — Episódio Diário

on:
  schedule:
    - cron: "0 10 * * *"   # 07h BR (10h UTC) — gerar episódio pela manhã
  workflow_dispatch:
    inputs:
      episode_num:
        description: "Número do episódio (1-8)"
        default: "1"
      tts_voice:
        description: "Voz TTS"
        default: "pt-BR-FranciscaNeural"

jobs:
  podcast:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - name: Install deps
        run: pip install requests edge-tts --break-system-packages
      - name: Generate episode
        env:
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          EPISODE_NUM:          ${{ github.event.inputs.episode_num || '1' }}
          TTS_VOICE:            ${{ github.event.inputs.tts_voice || 'pt-BR-FranciscaNeural' }}
        run: python3 scripts/podcast_pipeline.py
      - name: Upload audio artifact
        uses: actions/upload-artifact@v4
        with:
          name: podcast-ep-${{ github.event.inputs.episode_num || '1' }}
          path: output/podcasts/*.mp3
          retention-days: 30
