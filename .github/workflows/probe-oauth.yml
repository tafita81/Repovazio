name: "Probe OAuth (YT vs YOUTUBE)"
on:
  workflow_dispatch:
jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Deps
        run: pip install requests --break-system-packages -q
      - name: Probe
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python3 - <<'PYEOF'
          import os, json, requests
          out = []
          pairs = [
            ("YOUTUBE", os.getenv("YOUTUBE_CLIENT_ID",""), os.getenv("YOUTUBE_CLIENT_SECRET",""), os.getenv("YOUTUBE_REFRESH_TOKEN","")),
            ("YT", os.getenv("YT_CLIENT_ID",""), os.getenv("YT_CLIENT_SECRET",""), os.getenv("YT_REFRESH_TOKEN","")),
          ]
          for label, cid, csec, rt in pairs:
              if not (cid and csec and rt):
                  out.append("%s: MISSING (cid=%s csec=%s rt=%s)" % (label, bool(cid), bool(csec), bool(rt))); continue
              r = requests.post("https://oauth2.googleapis.com/token", timeout=30, data={"client_id":cid,"client_secret":csec,"refresh_token":rt,"grant_type":"refresh_token"})
              line = "%s refresh HTTP %d %s" % (label, r.status_code, r.text[:90].replace(chr(10)," "))
              if r.status_code == 200:
                  at = r.json()["access_token"]
                  c = requests.get("https://www.googleapis.com/youtube/v3/channels?part=id,snippet&mine=true", headers={"Authorization":"Bearer "+at}, timeout=30)
                  title = ""
                  try:
                      items = c.json().get("items", [])
                      if items: title = items[0]["id"] + " / " + items[0]["snippet"]["title"]
                  except Exception: title = c.text[:120]
                  line += " || channels.mine HTTP %d %s" % (c.status_code, title)
              out.append(line)
              print(line)
          su, sk = os.getenv("SUPABASE_URL","").rstrip("/"), os.getenv("SUPABASE_SERVICE_KEY","")
          if su and sk:
              h = {"apikey": sk, "Authorization": "Bearer "+sk, "Content-Type": "application/json"}
              val = " ||| ".join(out)
              up = requests.patch(su+"/rest/v1/ia_cache?cache_key=eq.agent:probe_oauth", headers={**h,"Prefer":"return=representation"}, data=json.dumps({"value": val}), timeout=20)
              if not (up.status_code in (200,204) and up.text not in ("[]","")):
                  requests.post(su+"/rest/v1/ia_cache", headers=h, data=json.dumps({"cache_key":"agent:probe_oauth","value":val,"expires_at":"2099-01-01T00:00:00Z"}), timeout=20)
          PYEOF
