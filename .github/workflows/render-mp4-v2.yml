name: Render MP4 V2 (Pillow + TTS + Ken Burns + FFmpeg)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install supabase requests pillow numpy edge-tts
          sudo apt-get install -y ffmpeg

      - name: Passo 1 — Gerar imagens Psych2Go 2D (Pillow + NVIDIA fallback)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          python3 scripts/render_quantum_v2.py

      - name: Passo 2 — Gerar audio TTS (Edge TTS PT-BR FranciscaNeural)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python3 scripts/tts_v2.py

      - name: Passo 3 — Render MP4 (Ken Burns + Audio + lower third, ZERO texto)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python3 scripts/render_ffmpeg_v2.py

      - name: Report
        if: always()
        run: echo "Render V2 pipeline completo - $(date)"
