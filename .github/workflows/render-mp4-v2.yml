name: render-mp4-v2

on:
  workflow_dispatch:
    inputs:
      pipeline_id:
        description: 'Pipeline ID to render (single, leave blank for batch)'
        required: false
        type: string
      batch_mp4_ready:
        description: 'Re-render ALL pipelines status=mp4_ready (true/false)'
        required: false
        type: string
        default: 'false'
  repository_dispatch:
    types: [render_v2]

jobs:
  render-v2:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg && ffmpeg -version | head -1

      - name: Install Python deps
        run: pip install --quiet edge-tts==6.1.12 requests==2.31.0

      - name: Resolve pipeline IDs
        id: pids
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python3 <<'PY'
          import os, requests, json
          PID = "${{ inputs.pipeline_id }}".strip()
          BATCH = "${{ inputs.batch_mp4_ready }}" == "true"
          PAYLOAD = json.loads('${{ toJson(github.event.client_payload) }}' or '{}')

          if PID:
              pids = [int(PID)]
          elif BATCH:
              r = requests.get(
                  f"{os.environ['SUPABASE_URL']}/rest/v1/content_pipeline?status=eq.mp4_ready&select=id&order=id.desc",
                  headers={'apikey': os.environ['SUPABASE_SERVICE_KEY'],
                           'Authorization': f"Bearer {os.environ['SUPABASE_SERVICE_KEY']}"}, timeout=30)
              pids = [p['id'] for p in r.json()]
          elif PAYLOAD.get('pipeline_id'):
              pids = [int(PAYLOAD['pipeline_id'])]
          else:
              r = requests.get(
                  f"{os.environ['SUPABASE_URL']}/rest/v1/content_pipeline?status=eq.mp4_ready&select=id&order=id.desc&limit=1",
                  headers={'apikey': os.environ['SUPABASE_SERVICE_KEY'],
                           'Authorization': f"Bearer {os.environ['SUPABASE_SERVICE_KEY']}"}, timeout=30)
              pids = [p['id'] for p in r.json()][:1]

          out = ','.join(str(p) for p in pids)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f: f.write(f"pids={out}\n")
          print(f"Will render: {pids}")
          PY

      - name: Render videos (V2 Psych2Go style, ZERO TEXT)
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          IFS=',' read -ra PIDS <<< "${{ steps.pids.outputs.pids }}"
          for pid in "${PIDS[@]}"; do
            if [ -n "$pid" ]; then
              echo ""
              echo "============================================"
              echo "🎬 Rendering pipeline #$pid (V2 Psych2Go)"
              echo "============================================"
              python3 scripts/video_gen_v2.py "$pid" || echo "❌ Pipeline #$pid failed (continuing)"
            fi
          done
