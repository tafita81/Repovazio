name: Render MP4 V2 (Flux + Ken Burns — Padrao Quantico)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install supabase requests pillow numpy

      - name: Render Quantum Videos (Flux + Ken Burns V2)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python3 scripts/render_quantum_v2.py

      - name: Report
        if: always()
        run: echo "Render quantico V2 concluido - $(date)"
