name: Gravia Bot — AI Latency Arb 24/7

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Run AI-Enhanced Latency Arb Bot
        env:
          GROQ_API_KEY:    ${{ secrets.GROQ_API_KEY }}
          NVIDIA_API_KEY:  ${{ secrets.NVIDIA_API_KEY }}
          OPENAI_API_KEY:  ${{ secrets.OPENAI_API_KEY }}
        run: |
          python3 << 'PYEOF'
import os,json,math,time,requests
from datetime import datetime

SB_URL="https://tpjvalzwkqwttvmszvie.supabase.co"
SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRwanZhbHp3a3F3dHR2bXN6dmllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMzUyOTMsImV4cCI6MjA5MTYxMTI5M30.UEgUo0Mw15ihQZykLAY5QApRzgTXkfIewZFzIgwao3Q"
NVIDIA=os.environ.get("NVIDIA_API_KEY","")
GROQ=os.environ.get("GROQ_API_KEY","")
OPENAI=os.environ.get("OPENAI_API_KEY","")
def hdr():return{"apikey":SB_KEY,"Authorization":f"Bearer {SB_KEY}","Content-Type":"application/json","Prefer":"return=representation"}
def sb_get(t,f=""):r=requests.get(f"{SB_URL}/rest/v1/{t}?{f}",headers=hdr(),timeout=8);return r.json()
def sb_up(t,d,filt):requests.patch(f"{SB_URL}/rest/v1/{t}?{filt}",headers=hdr(),json=d,timeout=8)
def sb_ins(t,d):return requests.post(f"{SB_URL}/rest/v1/{t}",headers=hdr(),json=d,timeout=8).json()
def sb_us(t,d):requests.post(f"{SB_URL}/rest/v1/{t}",headers={**hdr(),"Prefer":"resolution=merge-duplicates,return=minimal"},json=d,timeout=8)
def ai_decide(prompt):
  if GROQ:
    try:
      r=requests.post("https://api.groq.com/openai/v1/chat/completions",headers={"Authorization":f"Bearer {GROQ}","Content-Type":"application/json"},json={"model":"llama-3.3-70b-versatile","messages":[{"role":"user","content":prompt}],"max_tokens":60,"temperature":0.1},timeout=5)
      return r.json()["choices"][0]["message"]["content"].strip().upper(),"groq"
    except:pass
  if NVIDIA:
    try:
      r=requests.post("https://integrate.api.nvidia.com/v1/chat/completions",headers={"Authorization":f"Bearer {NVIDIA}","Content-Type":"application/json"},json={"model":"deepseek-ai/deepseek-v3","messages":[{"role":"user","content":prompt}],"max_tokens":60,"temperature":0.1},timeout=8)
      return r.json()["choices"][0]["message"]["content"].strip().upper(),"nvidia"
    except:pass
  if OPENAI:
    try:
      r=requests.post("https://api.openai.com/v1/chat/completions",headers={"Authorization":f"Bearer {OPENAI}","Content-Type":"application/json"},json={"model":"gpt-4o-mini","messages":[{"role":"user","content":prompt}],"max_tokens":60,"temperature":0.1},timeout=8)
      return r.json()["choices"][0]["message"]["content"].strip().upper(),"openai"
    except:pass
  return "EXECUTE","no-ai"
def get_btc():
  try:r=requests.get("https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT",timeout=5);return float(r.json()["price"])
  except:return None
def find_market():
  try:
    ms=requests.get("https://gamma-api.polymarket.com/markets?active=true&closed=false&tag_slug=crypto&_limit=100",timeout=8).json()
    ms=ms if isinstance(ms,list) else ms.get("markets",[])
    for m in ms:
      q=(m.get("question") or m.get("title","")).lower();tk=m.get("tokens",[])
      if len(tk)<2 or("btc"not in q and"bitcoin"not in q):continue
      up=next((t for t in tk if(t.get("outcome")or"").lower()in["up","yes","higher","above"]),None)
      dn=next((t for t in tk if(t.get("outcome")or"").lower()in["down","no","lower","below"]),None)
      uid=(up or tk[0]).get("token_id")or(up or tk[0]).get("tokenId")
      did=(dn or tk[1]).get("token_id")or(dn or tk[1]).get("tokenId")if dn else uid
      if not uid:continue
      et=int(time.time())+300
      try:et=int(__import__("datetime").datetime.fromisoformat((m.get("endDate")or"").replace("Z","+00:00")).timestamp())
      except:pass
      return{"id":m.get("id","?"),"upid":uid,"dnid":did,"end_ts":et}
  except:pass
  return None
def get_poly(ui,di):
  def mid(tid):
    try:b=requests.get(f"https://clob.polymarket.com/book?token_id={tid}",timeout=5).json();a=float(b["asks"][0]["price"])if b.get("asks")else None;bi=float(b["bids"][0]["price"])if b.get("bids")else None;return(a+bi)/2 if a and bi else(a or bi)
    except:return None
  return mid(ui),mid(di)
def detect(hist,btc,up,dn,end_ts,st):
  now=int(time.time())
  if not btc or not up or up<0.35 or up>0.65:return None
  if end_ts-now<90 or now-st<120:return None
  h=[p for p in hist if p["ts"]>=now-300]
  if len(h)<2:return None
  old=min(h,key=lambda p:p["ts"]);pct=(btc-old["btc"])/old["btc"]*100
  if abs(pct)<0.8:return None
  fv=1/(1+math.exp(-abs(pct)*3));dir="UP"if pct>0 else"DOWN"
  pp=up if dir=="UP"else(dn or 1-up);edge=fv-pp
  if edge<0.08:return None
  return{"dir":dir,"entry":min(pp*1.003,0.97),"fv":fv,"pp":pp,"edge":edge,"pct":pct}
def main():
  now=int(time.time());print(f"[{datetime.now().strftime('%H:%M:%S')}] Gravia AI Bot")
  st_a=sb_get("gravia_state","id=eq.1");st=st_a[0] if st_a else{}
  if st.get("is_halted"):print("HALTED");return
  btc=get_btc()
  if not btc:print("Binance fail");return
  print(f"BTC=${btc:,.2f}")
  hist=st.get("price_history")or[]
  if isinstance(hist,str):hist=json.loads(hist)
  hist.append({"ts":now,"btc":btc});hist=hist[-20:]
  mid_=st.get("market_id");up=st.get("market_up_token");dn=st.get("market_down_token")
  end_ts=st.get("market_end_ts",0);start_ts=st.get("market_start_ts",now-150)
  if not end_ts or now>=end_ts-5 or not up:
    m=find_market()
    if not m:sb_us("gravia_state",{"id":1,"btc_price":btc,"price_history":hist,"last_run_ts":now});return
    mid_=m["id"];up=m["upid"];dn=m["dnid"];end_ts=m["end_ts"];start_ts=now
    print(f"Market expires {end_ts-now}s")
  up_p,dn_p=get_poly(up,dn)
  print(f"PM UP={f'{up_p:.3f}' if up_p else 'N/A'}")
  if st.get("has_open_position")and st.get("open_entry_ts"):
    hold=now-st["open_entry_ts"];ep=(up_p if st["open_direction"]=="UP" else dn_p)or st["open_entry_price"]
    if hold>=240 or end_ts-now<60:
      pnl=(ep-st["open_entry_price"])*(1 if st["open_direction"]=="UP" else-1)*(10/st["open_entry_price"])
      won=pnl>0;ot=sb_get("gravia_trades","status=eq.open&order=ts.desc&limit=1")
      if ot:sb_up("gravia_trades",{"exit_price":round(ep,4),"hold_seconds":hold,"pnl_usdc":round(pnl,4),"roi_pct":round(pnl/10*100,2),"won":won,"status":"closed"},f"id=eq.{ot[0]['id']}")
      tp=(st.get("total_pnl")or 0)+pnl;cl=0 if won else(st.get("consec_losses")or 0)+1
      print(f"{'WIN'if won else'LOSS'} {pnl:.4f}")
      sb_us("gravia_state",{"id":1,"has_open_position":False,"open_direction":None,"open_entry_price":None,"open_entry_ts":None,"total_pnl":tp,"total_wins":(st.get("total_wins")or 0)+(1 if won else 0),"total_trades":(st.get("total_trades")or 0)+1,"consec_losses":cl,"daily_pnl":(st.get("daily_pnl")or 0)+pnl,"is_halted":(st.get("daily_pnl")or 0)+pnl<=-100 or cl>=3,"btc_price":btc,"poly_up_price":up_p,"price_history":hist,"last_run_ts":now,"market_id":mid_,"market_up_token":up,"market_down_token":dn,"market_end_ts":end_ts})
      return
  h5m=[p for p in hist if p["ts"]>=now-300];pct5m=(btc-h5m[0]["btc"])/h5m[0]["btc"]*100 if len(h5m)>1 else 0
  sig=detect(hist,btc,up_p or 0,dn_p,end_ts,start_ts)
  if not sig:
    print(f"No signal BTC5m={pct5m:+.3f}% PM={f'{up_p:.3f}'if up_p else'N/A'}")
    sb_us("gravia_state",{"id":1,"btc_price":btc,"poly_up_price":up_p,"last_btc_pct":pct5m,"price_history":hist,"last_run_ts":now,"market_id":mid_,"market_up_token":up,"market_down_token":dn,"market_end_ts":end_ts})
    return
  prompt=f"Polymarket BTC Latency Arb.\nBTC: ${btc:,.0f}\nVariação 5min: {sig['pct']:+.2f}%\nPolymarket UP: {sig['pp']:.3f} (fair value: {sig['fv']:.3f})\nEdge: {sig['edge']*100:.1f}%\nExpira em: {end_ts-now}s\n\nO lag de repricing do Polymarket vs Binance justifica o edge.\nEXECUTE ou SKIP apenas (1 palavra):"
  dec,model=ai_decide(prompt)
  print(f"AI ({model}): {dec[:20]}")
  if"SKIP"in dec:
    sb_ins("gravia_signals",{"direction":sig["dir"],"btc_pct":round(sig["pct"],4),"poly_price":round(sig["pp"],4),"fair_prob":round(sig["fv"],4),"edge":round(sig["edge"],4),"executed":False})
    sb_us("gravia_state",{"id":1,"btc_price":btc,"poly_up_price":up_p,"last_btc_pct":pct5m,"price_history":hist,"last_run_ts":now,"market_id":mid_,"market_up_token":up,"market_down_token":dn,"market_end_ts":end_ts})
    return
  print(f"EXECUTE {sig['dir']} {sig['pct']:+.2f}% edge={sig['edge']*100:.1f}%")
  sb_ins("gravia_signals",{"direction":sig["dir"],"btc_pct":round(sig["pct"],4),"poly_price":round(sig["pp"],4),"fair_prob":round(sig["fv"],4),"edge":round(sig["edge"],4),"executed":True})
  sb_ins("gravia_trades",{"direction":sig["dir"],"entry_price":round(sig["entry"],4),"size_usdc":10,"edge":round(sig["edge"],4),"btc_pct":round(sig["pct"],4),"market_id":mid_,"status":"open"})
  sb_us("gravia_state",{"id":1,"has_open_position":True,"open_direction":sig["dir"],"open_entry_price":round(sig["entry"],4),"open_entry_ts":now,"open_size_usdc":10,"open_fair_prob":round(sig["fv"],4),"open_edge":round(sig["edge"],4),"btc_price":btc,"poly_up_price":up_p,"last_btc_pct":pct5m,"price_history":hist,"last_run_ts":now,"market_id":mid_,"market_up_token":up,"market_down_token":dn,"market_end_ts":end_ts,"market_start_ts":start_ts})
  print(f"TRADE ABERTO @ {sig['entry']:.4f}")
main()
PYEOF
