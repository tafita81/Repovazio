name: Build Guard

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install deps
        run: npm install

      - name: Lint check (basic)
        run: |
          echo "Checking for missing env vars..."
          if grep -r "process.env.OPENAI_API_KEY" .; then
            echo "OPENAI used"
          fi

      - name: Build test
        run: npm run build
