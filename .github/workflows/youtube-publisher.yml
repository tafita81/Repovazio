name: YouTube Publisher — Publicar mp4_ready
on:
  workflow_dispatch:
  schedule:
    - cron: '0 8,14,20 * * *'

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install
        run: pip install requests google-auth-oauthlib google-api-python-client

      - name: Publicar @psidanielacoelho
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          YT_CHANNEL_ID: "UCyCkIpsVgME9yCj_oXJFheA"
          BLOCKED_CHANNEL: "UCSH63tBfY6wEIdkC4u4zKdg"
        run: |
          python3 << 'PY'
import os, json, requests

SBU = os.environ["SUPABASE_URL"]
SBK = os.environ["SUPABASE_KEY"]
CID = os.environ["YT_CLIENT_ID"]
SEC = os.environ["YT_CLIENT_SECRET"]
RTK = os.environ["YT_REFRESH_TOKEN"]
ALLOWED = "UCyCkIpsVgME9yCj_oXJFheA"
BLOCKED = "UCSH63tBfY6wEIdkC4u4zKdg"

# 1. Obter access token
r = requests.post("https://oauth2.googleapis.com/token", data={
    "client_id": CID, "client_secret": SEC,
    "refresh_token": RTK, "grant_type": "refresh_token"
}, timeout=15)
print(f"Token request: {r.status_code}")
if not r.ok:
    print(f"Erro: {r.text[:200]}")
    exit(1)
token = r.json()["access_token"]

# 2. Verificar canal
r2 = requests.get(
    "https://www.googleapis.com/youtube/v3/channels?part=snippet&mine=true",
    headers={"Authorization": f"Bearer {token}"}, timeout=15)
items = r2.json().get("items", [])
channel_ok = False
for item in items:
    cid = item["id"]
    name = item["snippet"]["title"]
    if cid == BLOCKED:
        print(f"BLOQUEADO! Canal {name} ({cid}) — abortando")
        exit(1)
    if cid == ALLOWED:
        print(f"OK! Canal: {name} ({cid})")
        channel_ok = True

if not channel_ok:
    print(f"Canal desconhecido: {[i['id'] for i in items]}")
    exit(1)

# 3. Buscar mp4_ready
hdrs = {"Authorization": f"Bearer {SBK}", "apikey": SBK}
videos = requests.get(f"{SBU}/rest/v1/content_pipeline?status=eq.mp4_ready&mp4_url=not.is.null&limit=2&order=id.asc&select=id,title,script,mp4_url,target_platform", headers=hdrs, timeout=15).json()
print(f"{len(videos)} vídeos prontos")

for v in videos:
    print(f"Publicando #{v['id']}: {v['title'][:60]}")
    mp4 = requests.get(v["mp4_url"], stream=True, timeout=120)
    if not mp4.ok:
        print(f"Falha download: {mp4.status_code}")
        continue
    with open(f"/tmp/v{v['id']}.mp4","wb") as f:
        for chunk in mp4.iter_content(8192): f.write(chunk)
    
    from googleapiclient.discovery import build
    from googleapiclient.http import MediaFileUpload
    from google.oauth2.credentials import Credentials
    creds = Credentials(token=token, refresh_token=RTK,
        token_uri="https://oauth2.googleapis.com/token", client_id=CID, client_secret=SEC)
    yt = build("youtube","v3",credentials=creds,cache_discovery=False)
    desc = (v.get("script","")[:4800] or "") + "\n\n@psidanielacoelho"
    body = {"snippet":{"title":v["title"][:100],"description":desc,"tags":["psicologia","saude mental"],"categoryId":"22"},
            "status":{"privacyStatus":"public","selfDeclaredMadeForKids":False}}
    media = MediaFileUpload(f"/tmp/v{v['id']}.mp4","video/mp4",resumable=True,chunksize=5*1024*1024)
    req_yt = yt.videos().insert(part="snippet,status",body=body,media_body=media)
    resp = None
    while resp is None:
        st, resp = req_yt.next_chunk()
        if st: print(f"  {int(st.progress()*100)}%")
    yt_id = resp["id"]
    yt_url = f"https://youtube.com/watch?v={yt_id}"
    print(f"✅ {yt_url}")
    requests.patch(f"{SBU}/rest/v1/content_pipeline?id=eq.{v['id']}",
        headers={**hdrs,"Content-Type":"application/json","Prefer":"return=minimal"},
        json={"status":"published","youtube_url":yt_url}, timeout=15)

print("Concluido!")
PY
