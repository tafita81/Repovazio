name: KDP Multilingual — 5 idiomas weekly

on:
  schedule:
    - cron: "0 2 * * 0"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install requests edge-tts --break-system-packages
      - name: KDP Multilingual — 5 idiomas weekly
        env:
          GROQ_API_KEY:              ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DEEPL_API_KEY:             ${{ secrets.DEEPL_API_KEY }}
          HOTMART_CLIENT_ID:         ${{ secrets.HOTMART_CLIENT_ID }}
          GUMROAD_ACCESS_TOKEN:      ${{ secrets.GUMROAD_ACCESS_TOKEN }}
          GNEWS_API_KEY:             ${{ secrets.GNEWS_API_KEY }}
          ASSEMBLYAI_API_KEY:        ${{ secrets.ASSEMBLYAI_API_KEY }}
          BANNERBEAR_API_KEY:        ${{ secrets.BANNERBEAR_API_KEY }}
          NVIDIA_API_KEY:            ${{ secrets.NVIDIA_API_KEY }}
        run: python3 scripts/kdp_multilingual.py
