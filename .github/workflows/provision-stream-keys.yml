name: "Agente: Provisionar Stream Keys (auto)"
on:
  workflow_dispatch:
  schedule:
    - cron: "30 0,6,12,18 * * *"
permissions:
  contents: read
jobs:
  provision:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Deps
        run: pip install requests pynacl --break-system-packages -q
      - name: Provisionar stream keys
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_REPO: ${{ github.repository }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TARGET_LANGS: "PT,EN,ES,DE,FR,IT,JA,KO,AR,ZH,RU,HI"
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_REFRESH_TOKEN_EN: ${{ secrets.YOUTUBE_REFRESH_TOKEN_EN }}
          YOUTUBE_REFRESH_TOKEN_ES: ${{ secrets.YOUTUBE_REFRESH_TOKEN_ES }}
          YOUTUBE_REFRESH_TOKEN_DE: ${{ secrets.YOUTUBE_REFRESH_TOKEN_DE }}
          YOUTUBE_REFRESH_TOKEN_FR: ${{ secrets.YOUTUBE_REFRESH_TOKEN_FR }}
          YOUTUBE_REFRESH_TOKEN_IT: ${{ secrets.YOUTUBE_REFRESH_TOKEN_IT }}
          YOUTUBE_REFRESH_TOKEN_JA: ${{ secrets.YOUTUBE_REFRESH_TOKEN_JA }}
          YOUTUBE_REFRESH_TOKEN_KO: ${{ secrets.YOUTUBE_REFRESH_TOKEN_KO }}
          YOUTUBE_REFRESH_TOKEN_AR: ${{ secrets.YOUTUBE_REFRESH_TOKEN_AR }}
          YOUTUBE_REFRESH_TOKEN_ZH: ${{ secrets.YOUTUBE_REFRESH_TOKEN_ZH }}
          YOUTUBE_REFRESH_TOKEN_RU: ${{ secrets.YOUTUBE_REFRESH_TOKEN_RU }}
          YOUTUBE_REFRESH_TOKEN_HI: ${{ secrets.YOUTUBE_REFRESH_TOKEN_HI }}
        run: python3 scripts/provision_stream_keys.py
