name: Redbubble — Designs Psicologia Dark

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 3"   # Toda Quarta 6h BRT

jobs:
  redbubble:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests pillow --break-system-packages

      - name: Redbubble Engine — designs dark psicologia
        env:
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python3 scripts/redbubble_batch_engine.py || true
        continue-on-error: true
