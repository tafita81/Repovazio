name: YouTube Live 🇺🇸 EN — USA/UK/AU/CA

on:
  workflow_dispatch:
    inputs:
      horas:
        description: "Horas"
        default: "6"
  schedule:
    # Primetime USA EST: 8pm-midnight = UTC 00-04
    # Morning USA: 8am-noon = UTC 12-16
    - cron: "0 0,6,12,18 * * *"

jobs:
  live-en:
    runs-on: ubuntu-latest
    timeout-minutes: 375
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: |
          sudo apt-get install -y ffmpeg > /dev/null 2>&1
          pip install requests --break-system-packages
      - name: Check stream key
        run: |
          [ -z "$YOUTUBE_STREAM_KEY_EN" ] && [ -z "$YOUTUBE_STREAM_KEY" ] && echo "Need YOUTUBE_STREAM_KEY_EN" && exit 1
          echo "✅ Stream key EN OK"
        env:
          YOUTUBE_STREAM_KEY_EN: ${{ secrets.YOUTUBE_STREAM_KEY_EN }}
          YOUTUBE_STREAM_KEY:    ${{ secrets.YOUTUBE_STREAM_KEY }}
      - name: Live EN 24/7
        env:
          YOUTUBE_STREAM_KEY_EN: ${{ secrets.YOUTUBE_STREAM_KEY_EN }}
          YOUTUBE_STREAM_KEY:    ${{ secrets.YOUTUBE_STREAM_KEY }}
          GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
        run: timeout $((${HORAS:-6} * 3600)) python3 scripts/live_global_en.py || true
        continue-on-error: true
