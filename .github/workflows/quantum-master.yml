name: Quantum Brain Auto-Combinatorial

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  quantum:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests --break-system-packages

      - name: Verificar secrets obrigatórias
        run: |
          [ -z "$SUPABASE_URL" ] && echo "SUPABASE_URL não configurado" && exit 0
          [ -z "$SUPABASE_SERVICE_KEY" ] && echo "SUPABASE_SERVICE_KEY não configurado" && exit 0
          echo "Secrets OK"
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Run Quantum Brain Expander
        env:
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          NVIDIA_API_KEY:       ${{ secrets.NVIDIA_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python3 scripts/brain_mass_expander.py || true
        continue-on-error: true
