name: "🖤 Sleep Psychology — 7 Dark Techniques + Quantum Cognition @psidanicoelho"

# v2: 4 atos hipnóticos + cognição quântica Busemeyer/Pothos + DMN Raichle
# Diferenciais vs Sleep Cove / Sleep Magic / Smarter While You Sleep:
#   - única que cita pesquisa quântica real (ninguém faz)
#   - formato 7 técnicas numeradas (viral) + indução hipnótica progressiva
#   - 9 idiomas com voz consistente Daniela Coelho

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0,2,4,6 * * *"

jobs:
  black_live:
    runs-on: ubuntu-latest
    timeout-minutes: 375
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: |
          sudo apt-get install -y ffmpeg > /dev/null 2>&1
          pip install requests edge-tts --break-system-packages -q
      - name: "🖤 EN — 4 atos + quântica"
        env:
          LANG_CODE:          EN
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
        run: |
          timeout 21600 python3 scripts/live_black_screen_v2.py || true
        continue-on-error: true
