name: Agente Web Playwright (GRATIS)

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"   # drena a fila a cada 30 min; sai em segundos se vazia (free-friendly)

jobs:
  agent:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install requests playwright --break-system-packages
      - run: python -m playwright install chromium --with-deps
      - name: Drenar fila de tarefas web
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python3 scripts/browser_agent.py
