name: YouTube Live 24/7

on:
  workflow_dispatch:
    inputs:
      duracao_horas:
        description: "Duração em horas (máx 6h no Actions)"
        default: "5"

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6 horas máx
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg
      - run: pip install requests --break-system-packages
      - name: Start stream
        env:
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
        run: |
          echo "Para stream 24/7 contínuo, use servidor VPS próprio."
          echo "GitHub Actions máximo: 6 horas por run."
          python3 scripts/youtube_live_24_7.py
