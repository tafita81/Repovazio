name: YouTube Live 24/7 — Psicologia Continua

on:
  workflow_dispatch:
    inputs:
      duracao_horas:
        description: "Duração da live em horas (default: 6)"
        default: "6"

jobs:
  live:
    runs-on: ubuntu-latest
    timeout-minutes: 380

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}

      - name: Instalar FFmpeg + Python deps
        run: |
          sudo apt-get install -y ffmpeg > /dev/null 2>&1
          pip install requests --break-system-packages

      - name: Verificar stream key
        run: |
          if [ -z "$YOUTUBE_STREAM_KEY" ]; then
            echo "❌ YOUTUBE_STREAM_KEY não configurado"
            echo ""
            echo "COMO CONFIGURAR (5 minutos):"
            echo "1. YouTube Studio → studio.youtube.com"
            echo "2. Criar conteúdo → Transmissão ao vivo → Programar"
            echo "3. Copiar Stream Key"
            echo "4. GitHub: tafita81/Repovazio → Settings → Secrets"
            echo "   Nome: YOUTUBE_STREAM_KEY"
            echo "   Valor: [stream key copiada]"
            exit 1
          fi
          echo "✅ Stream key configurada — iniciando live..."
        env:
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}

      - name: Iniciar live YouTube 24/7
        env:
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          DURACAO_HORAS:      ${{ inputs.duracao_horas }}
        run: |
          timeout $((${DURACAO_HORAS:-6} * 3600)) python3 scripts/youtube_live_24_7.py || true
        continue-on-error: true
