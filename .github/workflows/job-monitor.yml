name: Daily Job Monitor — Power BI & Data Analyst
on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:
jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run daily job monitor
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python3 .github/scripts/job_monitor.py
      - name: Save seen jobs
        run: |
          git config user.name "Job Monitor Bot"
          git config user.email "tafita81@gmail.com"
          git add .github/scripts/seen_jobs.json || true
          git diff --cached --quiet || git commit -m "chore: update seen jobs [skip ci]"
          git push || true
