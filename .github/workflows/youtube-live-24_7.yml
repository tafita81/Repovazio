name: YouTube Live 24/7 — Psicologia Stream
on:
  workflow_dispatch:
  schedule:
    - cron: "0 8,14,20 * * *"
jobs:
  live-stream:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests --break-system-packages
      - run: sudo apt-get install -y ffmpeg fonts-dejavu-core
      - name: YouTube Live 24/7
        env:
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
        run: timeout 18000 python3 scripts/youtube_live_24_7.py || true
        continue-on-error: true
