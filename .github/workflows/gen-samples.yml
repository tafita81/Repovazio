name: "🎧 Gera Samples de Áudio para Validação"

on:
  workflow_dispatch:

jobs:
  samples:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: |
          sudo apt-get install -y ffmpeg > /dev/null 2>&1
          pip install edge-tts requests --break-system-packages -q
      - name: "Gerar samples v2 (femininas estilo top podcasts)"
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python3 scripts/gen_audio_samples_v2.py
