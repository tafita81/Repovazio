name: 🚀 Job Hunter MASTER — 24/7 (Every Hour)
on:
  schedule:
    - cron: "30 * * * *"
  workflow_dispatch:
jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: pip install -q reportlab
      - name: Full Hunt — Email + ATS + Report
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: python3 .github/scripts/production_hunter.py all
      - name: Commit state
        run: |
          git config user.name "Job Hunter 24/7"
          git config user.email "tafita81@gmail.com"
          git add -A 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: job state update [skip ci]"
          git push 2>/dev/null || true
