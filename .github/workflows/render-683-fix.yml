name: "🔧 Render Fix #683 — Gemini 2025"
on:
  workflow_dispatch:
jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          pip install --quiet requests Pillow urllib3
          pip install --quiet urllib3[secure] 2>/dev/null || true
          sudo apt-get install -y ffmpeg --quiet 2>/dev/null
      - name: 🔧 Render Fix
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/render_683_fix.py
