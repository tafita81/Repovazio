name: "YouTube Live ES — Psicologia 24h @psidanicoelho"

on:
  workflow_dispatch:
    inputs:
      horas:
        description: "Duracao horas (max 6)"
        default: "6"
  schedule:
    - cron: "0 2,8,14,20 * * *"

jobs:
  live:
    runs-on: ubuntu-latest
    timeout-minutes: 370
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: |
          sudo apt-get install -y ffmpeg > /dev/null 2>&1
          pip install requests pillow --break-system-packages -q
      - name: Live ES 24h
        env:
          LANG_CODE:          ES
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY_ES }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
        run: |
          H="${{ inputs.horas || '6' }}"
          timeout $((H * 3600)) python3 scripts/live_universal.py || true
        continue-on-error: true
