name: YouTube Live KO — Psychology Freq KR

on:
  workflow_dispatch:
    inputs:
      horas:
        description: "Horas"
        default: "6"
  schedule:
    # Korea | CPM: $8-15
    - cron: "0 4,10,16,22 * * *"

jobs:
  live-ko:
    runs-on: ubuntu-latest
    timeout-minutes: 375
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: |
          sudo apt-get install -y ffmpeg > /dev/null 2>&1
          pip install requests --break-system-packages
      - name: Live KO 24/7
        env:
          LANG_CODE:              KO
          YOUTUBE_STREAM_KEY_KO: ${{ secrets.YOUTUBE_STREAM_KEY_KO }}
          YOUTUBE_STREAM_KEY:     ${{ secrets.YOUTUBE_STREAM_KEY }}
          GROQ_API_KEY:           ${{ secrets.GROQ_API_KEY }}
        run: |
          HORAS="${{ inputs.horas }}"
          timeout $((${HORAS:-6} * 3600)) python3 scripts/live_universal.py || true
        continue-on-error: true
