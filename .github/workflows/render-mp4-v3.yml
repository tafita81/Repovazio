name: Render MP4 V3 Cinematografico (ElevenLabs 0.88x + Dark Documentary + Dissolve)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install supabase requests pillow numpy edge-tts
          sudo apt-get install -y ffmpeg

      - name: Passo 1 — TTS ElevenLabs 0.88x (voz contemplativa cinematografica)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: python3 scripts/tts_v3.py

      - name: Passo 2 — Imagens Cinematograficas V3 (Dark Documentary)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: python3 scripts/render_cinematic_v3.py

      - name: Passo 3 — FFmpeg V3 (Dissolve + Color Grade + Drone Atmosferico)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python3 scripts/render_ffmpeg_v3.py

      - name: Report
        if: always()
        run: echo "Pipeline V3 Cinematografico concluido - $(date)"
