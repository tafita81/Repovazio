name: Render Video V8 Universal
on:
  workflow_dispatch:
    inputs:
      video_id:
        description: 'ID do video na tabela content_pipeline'
        required: true
        type: string

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with: { python-version: '3.11' }
      - name: Install deps
        run: pip install pillow requests edge-tts
      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg
      - name: Render Video V8
        env:
          VIDEO_ID: ${{ inputs.video_id }}
          SUPABASE_URL: https://tpjvalzwkqwttvmszvie.supabase.co
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python3 scripts/render_video_v8.py $VIDEO_ID
