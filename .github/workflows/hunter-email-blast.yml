name: 📧 Job Hunter — Email Blast (Every 6h)
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
jobs:
  email:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Send Email Applications (dedup by week)
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: python3 .github/scripts/production_hunter.py email
