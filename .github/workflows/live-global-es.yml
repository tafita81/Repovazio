name: Live Global ES — Español 24/7
on:
  workflow_dispatch:
  schedule:
    - cron: "0 11,17,23 * * *"
jobs:
  live-es:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests edge-tts --break-system-packages
      - run: sudo apt-get install -y ffmpeg
      - name: Live ES Stream
        env:
          YOUTUBE_STREAM_KEY_ES: ${{ secrets.YOUTUBE_STREAM_KEY_ES }}
          GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
        run: python3 scripts/live_global_es.py || true
        continue-on-error: true
