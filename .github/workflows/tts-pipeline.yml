name: TTS Pipeline (Edge TTS + Groq Emotion)

on:
  workflow_dispatch:
  schedule:
    - cron: '30 */3 * * *'

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install edge-tts requests --quiet

      - name: Generate Audio (Edge TTS PT-BR - 100% gratis)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python3 scripts/tts_pipeline.py

      - name: Trigger Render V2
        if: success()
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/render-mp4-v2.yml/dispatches" \
            -d '{"ref":"main"}' || echo "Render dispatch ok"
