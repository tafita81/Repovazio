name: TTS Pipeline (Edge TTS + Groq Emotion → MP4)
on:
  workflow_dispatch:
    inputs:
      pipeline_id:
        description: 'Pipeline ID (leave empty to auto-pick by target_platform)'
        required: false
        default: ''
      target_platform:
        description: 'Platform: youtube_long, youtube_shorts, instagram_reels, tiktok_short, pinterest_pin'
        required: false
        default: 'youtube_long'
  schedule:
    # 4 vídeos longos por dia + shorts adicionais (cron UTC)
    - cron: '0 9 * * *'   # 06:00 BRT - YouTube long do dia
    - cron: '0 13 * * *'  # 10:00 BRT - YouTube short
    - cron: '0 17 * * *'  # 14:00 BRT - Instagram Reels
    - cron: '0 21 * * *'  # 18:00 BRT - TikTok
    - cron: '0 1 * * *'   # 22:00 BRT - Pinterest

permissions:
  contents: read
  actions: write

jobs:
  tts:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Determine target_platform from cron
        id: platform
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            case "${{ github.event.schedule }}" in
              "0 9 * * *")  echo "platform=youtube_long" >> $GITHUB_OUTPUT;;
              "0 13 * * *") echo "platform=youtube_shorts" >> $GITHUB_OUTPUT;;
              "0 17 * * *") echo "platform=instagram_reels" >> $GITHUB_OUTPUT;;
              "0 21 * * *") echo "platform=tiktok_short" >> $GITHUB_OUTPUT;;
              "0 1 * * *")  echo "platform=pinterest_pin" >> $GITHUB_OUTPUT;;
              *)            echo "platform=youtube_long" >> $GITHUB_OUTPUT;;
            esac
          else
            echo "platform=${{ inputs.target_platform || 'youtube_long' }}" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          pip install --quiet edge-tts

      - name: Run TTS Pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          # LLM fallback chain 2026: Groq -> DeepSeek -> Nvidia V4Pro -> OpenAI
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          PIPELINE_ID: ${{ inputs.pipeline_id }}
          TARGET_PLATFORM: ${{ steps.platform.outputs.platform }}
        run: python3 scripts/tts_edge.py
