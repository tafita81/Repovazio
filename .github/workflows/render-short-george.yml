name: "🎙️ Short 58s — Kokoro PT-BR (Emoção Dinâmica)"

on:
  workflow_dispatch:
    inputs:
      video_id:
        description: "ID do vídeo"
        default: "683"
        required: true

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: kokoro-model-pt-br-v1

      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - name: 📦 Deps (Kokoro + ffmpeg + espeak)
        run: |
          pip install --quiet kokoro>=0.9.4 soundfile numpy requests edge-tts
          sudo apt-get install -y espeak-ng ffmpeg --quiet 2>/dev/null

      - name: 🎙️ Kokoro — Short 58s Emoção Dinâmica
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          VIDEO_ID: ${{ github.event.inputs.video_id }}
        run: python scripts/render_short_george.py
