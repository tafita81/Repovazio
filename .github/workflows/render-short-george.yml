name: "🎤 Short — Chatterbox George Clone PT-BR"

on:
  workflow_dispatch:
    inputs:
      video_id:
        description: "ID do vídeo"
        default: "683"
        required: true
      voice_version:
        description: "A=Clone George (moderado) | B=Enhanced (mais dramático)"
        default: "A"
        required: true

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: chatterbox-multilingual-v1
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: 📦 Deps
        run: |
          pip install --quiet torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install --quiet chatterbox-tts requests edge-tts soundfile
          sudo apt-get install -y ffmpeg --quiet 2>/dev/null
      - name: 🎤 Chatterbox — Versão ${{ github.event.inputs.voice_version }}
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          VIDEO_ID: ${{ github.event.inputs.video_id }}
          VOICE_VERSION: ${{ github.event.inputs.voice_version }}
        run: python scripts/render_short_george.py
