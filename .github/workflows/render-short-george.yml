name: "🎙️ Short 60s — XTTS v2 Clone George"

on:
  workflow_dispatch:
    inputs:
      video_id:
        description: "ID do vídeo"
        default: "683"
        required: true

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: ~/.local/share/tts
          key: xtts-v2-model-v1

      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - name: 📦 Deps
        run: |
          pip install --quiet TTS torch torchaudio soundfile numpy requests edge-tts
          sudo apt-get install -y espeak-ng ffmpeg --quiet 2>/dev/null

      - name: 🎙️ XTTS v2 George Clone
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          COQUI_TOS_AGREED: "1"
          VIDEO_ID: ${{ github.event.inputs.video_id }}
        run: python scripts/render_short_george.py
