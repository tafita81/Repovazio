name: "🎤 Short 58s — George ElevenLabs (Semântico v3)"

on:
  workflow_dispatch:
    inputs:
      video_id:
        description: "ID do vídeo"
        default: "683"
        required: true

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: 📦 Deps
        run: |
          pip install --quiet requests Pillow edge-tts
          sudo apt-get install -y ffmpeg --quiet 2>/dev/null
      - name: 🎤 George — Short Semântico v3
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          VIDEO_ID: ${{ github.event.inputs.video_id }}
        run: python scripts/render_short_george.py
