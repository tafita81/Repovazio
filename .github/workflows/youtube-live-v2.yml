name: YouTube Live 24/7 V2 — Lofi Psychology OTIMIZADO

on:
  workflow_dispatch:
    inputs:
      horas:
        description: "Duração em horas (max 6 por run)"
        default: "6"
  schedule:
    # Roda a cada 6h — primetime BR coberto:
    # 12h UTC = 09h BR  (manhã)
    # 18h UTC = 15h BR  (tarde)
    # 21h UTC = 18h BR  (prime time BR 1)
    # 00h UTC = 21h BR  (prime time BR 2)
    - cron: "0 12,18,21,0 * * *"

jobs:
  live:
    runs-on: ubuntu-latest
    timeout-minutes: 370

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}

      - name: Instalar dependências
        run: |
          sudo apt-get install -y ffmpeg > /dev/null 2>&1
          pip install requests pillow --break-system-packages

      - name: Verificar stream key
        run: |
          if [ -z "$YOUTUBE_STREAM_KEY" ]; then
            echo ""
            echo "══════════════════════════════════════════"
            echo "  YOUTUBE_STREAM_KEY não configurado"
            echo "══════════════════════════════════════════"
            echo ""
            echo "SETUP RÁPIDO (5 minutos):"
            echo ""
            echo "1. Abrir: https://studio.youtube.com"
            echo "2. Clicar: Criar → Transmissão ao vivo"
            echo "3. Título: 'Psicologia LIVE 🔴 | Daniela Coelho'"
            echo "4. Copiar a Stream Key"
            echo "5. GitHub: tafita81/Repovazio → Settings → Secrets → Actions"
            echo "   Nome: YOUTUBE_STREAM_KEY"
            echo "   Valor: [stream key copiada]"
            echo "6. Voltar aqui e clicar Run workflow"
            echo ""
            exit 1
          fi
          echo "✅ Stream key OK — iniciando live..."
        env:
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}

      - name: Live YouTube 24/7 — Lofi Psychology
        env:
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          HORAS:              ${{ inputs.horas }}
        run: |
          timeout $((${HORAS:-6} * 3600)) python3 scripts/youtube_live_v2.py || true
        continue-on-error: true

      - name: Log de execução
        if: always()
        run: |
          echo "Live encerrada: $(date)"
          echo "Próximo horário: conforme schedule (12h, 18h, 21h, 0h UTC)"
