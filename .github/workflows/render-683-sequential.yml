name: "📸 Vídeo 1 — Sequencial Pollinations (Garantido)"
on:
  workflow_dispatch:
jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          pip install --quiet requests Pillow urllib3
          sudo apt-get install -y ffmpeg --quiet 2>/dev/null
      - name: 📸 Render Sequencial
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/render_683_sequential.py
