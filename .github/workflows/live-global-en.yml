name: Live Global EN — English 24/7
on:
  workflow_dispatch:
  schedule:
    - cron: "0 10,16,22 * * *"
jobs:
  live-en:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests edge-tts --break-system-packages
      - run: sudo apt-get install -y ffmpeg
      - name: Live EN Stream
        env:
          YOUTUBE_STREAM_KEY_EN: ${{ secrets.YOUTUBE_STREAM_KEY_EN }}
          GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
        run: python3 scripts/live_global_en.py || true
        continue-on-error: true
