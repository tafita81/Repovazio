name: "CI: py_compile (valida scripts Python)"
on:
  workflow_dispatch:
  push:
    paths:
      - "scripts/**.py"
jobs:
  compile:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: py_compile (quarentena ignorada)
        run: |
          # QUARENTENA — scripts intencionalmente NAO executados (regra: nada pago, nada externo sem revisao):
          #   PAGO:            elevenlabs_trilhas (gasta credito ElevenLabs)
          #   ACAO EXTERNA:    newsletter_engine (emails), reddit_video_engine (posts), redbubble_batch_engine (produtos), hotmart_affiliate_engine (afiliado)
          #   CORRUPCAO MULTILINHA (regenerar depois): seo_global_master, seo_youtube_live_global
          SKIP="newsletter_engine reddit_video_engine redbubble_batch_engine hotmart_affiliate_engine seo_global_master seo_youtube_live_global"
          fail=0
          for f in scripts/*.py; do
            base=$(basename "$f" .py)
            case " $SKIP " in *" $base "*) echo "QUARENTENA (pulado): $f"; continue;; esac
            if ! python3 -m py_compile "$f" 2>/tmp/err; then
              echo "FALHOU: $f"; cat /tmp/err
              fail=1
            fi
          done
          echo "---"
          if [ "$fail" = "0" ]; then echo "RESULTADO_CI: OK (verde; quarentena ignorada)"; else echo "RESULTADO_CI: HOUVE FALHAS"; exit 1; fi
