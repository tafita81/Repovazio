name: "CI: py_compile (valida scripts Python)"
on:
  workflow_dispatch:
  push:
    paths:
      - "scripts/**.py"
jobs:
  compile:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: py_compile todos os scripts (nao-para)
        run: |
          fail=0
          for f in scripts/*.py; do
            if ! python3 -m py_compile "$f" 2>/tmp/err; then
              echo "FALHOU: $f"; cat /tmp/err
              fail=1
            fi
          done
          echo "---"
          if [ "$fail" = "0" ]; then echo "RESULTADO_CI: OK todos compilam"; else echo "RESULTADO_CI: HOUVE FALHAS (ver acima)"; exit 1; fi
