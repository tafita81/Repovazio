name: Podcast Spotify — Episódio Diário

on:
  workflow_dispatch:
    inputs:
      episodio:
        description: "Número do episódio (1-8)"
        default: "1"
  schedule:
    - cron: "0 13 * * 1,3,5"  # Seg/Qua/Sex 10h BRT

jobs:
  gerar-podcast:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests edge-tts --break-system-packages
      - run: sudo apt-get install -y ffmpeg

      - name: Gerar roteiro + narração + MP3
        env:
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          EPISODE_NUM:          ${{ github.event.inputs.episodio || '1' }}
        run: python3 scripts/podcast_pipeline.py || true
        continue-on-error: true

      - name: Upload MP3 como artifact
        uses: actions/upload-artifact@v4
        with:
          name: podcast-ep${{ github.event.inputs.episodio || '1' }}
          path: output/podcasts/*.mp3
          retention-days: 7
