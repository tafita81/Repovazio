name: "⚡ Piper TTS — Vozes Masculinas (120MB total)"
on: {workflow_dispatch: {}}

jobs:
  piper:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      
      - name: "Check disk before"
        run: |
          df -h /
          echo "---"
      
      - name: Install deps
        run: |
          sudo apt-get install -y ffmpeg > /dev/null 2>&1
          pip install --break-system-packages -q piper-tts requests
      
      - name: "Gerar PT/EN/ES com Piper"
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python3 scripts/piper_clone.py
      
      - name: "Check disk after"
        run: df -h /
