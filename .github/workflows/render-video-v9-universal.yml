name: "🎬 V9 Motion AI — Render Video"

on:
  workflow_dispatch:
    inputs:
      video_id:
        description: "ID do vídeo para renderizar (ex: 683)"
        required: true
        default: "683"
      force_gemini:
        description: "Forçar apenas Gemini estático (sem Veo)"
        required: false
        default: "false"

  schedule:
    # Roda 3x/dia: 6h, 12h, 18h UTC (pega fila audio_ready)
    - cron: "0 6,12,18 * * *"

concurrency:
  group: render-v9-${{ github.event.inputs.video_id || 'batch' }}
  cancel-in-progress: false

jobs:
  render-v9:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 📦 Instalar dependências
        run: |
          pip install requests edge-tts
          sudo apt-get install -y ffmpeg --quiet
          ffmpeg -version | head -1

      - name: 🎯 Determinar video_id (dispatch ou batch)
        id: get_video
        env:
          SUPABASE_URL: https://tpjvalzwkqwttvmszvie.supabase.co
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "video_id=${{ github.event.inputs.video_id }}" >> $GITHUB_OUTPUT
            echo "✅ Dispatch manual: video #${{ github.event.inputs.video_id }}"
          else
            # Batch: pega próximo da fila (audio_ready sem video_url)
            VIDEO=$(python3 -c "
          import requests, os
          url = os.environ['SUPABASE_URL']
          key = os.environ['SUPABASE_SERVICE_KEY']
          r = requests.get(
            f'{url}/rest/v1/content_pipeline',
            headers={'apikey':key,'Authorization':f'Bearer {key}'},
            params={'status':'eq.audio_ready','video_url':'is.null',
                    'select':'id,title','order':'id.asc','limit':'1'}
          )
          rows = r.json()
          if rows: print(rows[0]['id'])
          else: print('NONE')
          ")
            echo "video_id=$VIDEO" >> $GITHUB_OUTPUT
            echo "✅ Batch: próximo da fila = $VIDEO"
          fi

      - name: 🎬 Render V9 Motion AI
        if: steps.get_video.outputs.video_id != 'NONE'
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          FORCE_GEMINI: ${{ github.event.inputs.force_gemini || 'false' }}
        run: |
          VIDEO_ID=${{ steps.get_video.outputs.video_id }}
          echo "🎬 Renderizando vídeo #$VIDEO_ID com V9..."
          python scripts/render_video_v9.py $VIDEO_ID

      - name: ℹ️ Sem vídeos na fila
        if: steps.get_video.outputs.video_id == 'NONE'
        run: |
          echo "✅ Fila vazia — nenhum vídeo audio_ready pendente"

      - name: 📊 Resumo
        if: always()
        run: |
          echo "## 🎬 V9 Motion AI" >> $GITHUB_STEP_SUMMARY
          echo "- Video ID: ${{ steps.get_video.outputs.video_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- Pipeline: Veo 3.x motion + Gemini 2.5 Flash Image (fallback)" >> $GITHUB_STEP_SUMMARY
          echo "- Lower third: Daniela Coelho | Saude Mental | @psidanielacoelho" >> $GITHUB_STEP_SUMMARY
          echo "- Padrão: V9 chibi AI + real motion (NUNCA Pillow)" >> $GITHUB_STEP_SUMMARY
