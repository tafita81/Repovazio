name: "🎬 V9 Motion AI — Render Video"

on:
  workflow_dispatch:
    inputs:
      video_id:
        description: "ID do vídeo (ex: 683)"
        required: true
        default: "683"
  schedule:
    - cron: "0 6,12,18 * * *"

concurrency:
  group: render-v9-${{ github.event.inputs.video_id || 'batch' }}
  cancel-in-progress: false

jobs:
  render-v9:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Instalar dependências
        run: |
          pip install --quiet requests edge-tts pillow
          sudo apt-get install -y ffmpeg --quiet 2>/dev/null
          python3 -c "import requests, edge_tts, PIL; print('deps OK')"

      - name: 🎯 Determinar video_id
        id: get_video
        env:
          SUPABASE_URL: https://tpjvalzwkqwttvmszvie.supabase.co
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VID="${{ github.event.inputs.video_id }}"
          else
            VID=$(python3 - << 'PYEOF'
          import requests, os
          url = os.environ['SUPABASE_URL']
          key = os.environ['SUPABASE_SERVICE_KEY']
          r = requests.get(f'{url}/rest/v1/content_pipeline',
            headers={'apikey':key,'Authorization':f'Bearer {key}'},
            params={'status':'eq.audio_ready','video_url':'is.null',
                    'select':'id','order':'id.asc','limit':'1'})
          rows = r.json()
          print(rows[0]['id'] if rows else 'NONE')
          PYEOF
          )
          fi
          echo "video_id=$VID" >> $GITHUB_OUTPUT
          echo "✅ Video: $VID"

      - name: 🎬 Render V9 Motion AI
        if: steps.get_video.outputs.video_id != 'NONE'
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          python scripts/render_video_v9.py ${{ steps.get_video.outputs.video_id }}

      - name: 📊 Resumo
        if: always()
        run: |
          echo "## 🎬 V9 Motion AI — psicologia.doc" >> $GITHUB_STEP_SUMMARY
          echo "- Video: #${{ steps.get_video.outputs.video_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- Image: Gemini Flash Image (ou Pillow chibi psych2go)" >> $GITHUB_STEP_SUMMARY
          echo "- Lower third: Daniela Coelho | Saude Mental | @psidanielacoelho" >> $GITHUB_STEP_SUMMARY
