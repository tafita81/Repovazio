name: Cerebro — Crescimento Infinito (Semanal)

on:
  workflow_dispatch:
  schedule:
    # Roda 3x por semana: segunda, quarta e sexta às 8h BRT (11h UTC)
    - cron: '0 11 * * 1,3,5'

jobs:
  crescimento:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: pip install supabase requests

      - name: Executar Crescimento Infinito
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          WHATSAPP_TOKEN: ${{ secrets.WHATSAPP_TOKEN }}
          WHATSAPP_PHONE_ID: ${{ secrets.WHATSAPP_PHONE_ID }}
        run: python3 scripts/cerebro_crescimento_infinito.py

      - name: Disparar pipeline de geração
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: generate-new-content
