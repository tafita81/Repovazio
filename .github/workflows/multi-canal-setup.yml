name: Multi Canal Setup — PT+EN+ES Configuração
on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"
jobs:
  multi-canal:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests --break-system-packages
      - name: Multi Canal Setup + Canal Ascensao Finder
        env:
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python3 scripts/multi_canal_setup.py || true
          python3 scripts/canal_ascensao_finder.py || true
          python3 scripts/discovery_engine.py || true
        continue-on-error: true
