name: "🎚️ Pipeline Audio Pro (EQ+Comp+Reverb)"
on: {workflow_dispatch: {}}
jobs:
  audio:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: |
          sudo apt-get install -y ffmpeg > /dev/null 2>&1
          pip install edge-tts requests --break-system-packages -q
      - name: "Gerar samples PRO (4 idiomas, frase-a-frase, EQ pro)"
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python3 scripts/audio_pro_pipeline.py
