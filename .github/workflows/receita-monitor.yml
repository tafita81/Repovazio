name: Receita Monitor — A cada hora

on:
  workflow_dispatch:
  schedule:
    - cron: "30 * * * *"   # A cada hora no :30

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests --break-system-packages

      - name: "Monitor receita — vendas + assinantes + alertas"
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python3 scripts/receita_monitor.py || true
        continue-on-error: true

      - name: "YouTube description gen — SEO"
        if: github.event_name == 'workflow_dispatch'
        env:
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python3 scripts/youtube_description_gen.py || true
        continue-on-error: true
