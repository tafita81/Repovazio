<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Thumbnail 528Hz — @psidanielacoelho</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#09090F;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:20px;
  font-family:Arial Black,Arial,sans-serif;
  gap:16px;
}
p.label{color:#1e2040;font-size:10px;letter-spacing:3px;text-transform:uppercase}

/* ── THUMBNAIL 16:9 RESPONSIVO ── */
.thumb{
  width:100%;
  max-width:720px;
  aspect-ratio:16/9;
  background:#000000;
  border:clamp(2px,.4vw,3px) solid #3366FF;
  border-radius:clamp(8px,1.5vw,14px);
  overflow:hidden;
  box-shadow:0 0 clamp(30px,7vw,70px) #3366FF44;
  box-sizing:border-box;

  /* 3 ZONAS — nada se sobrepõe */
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  padding:clamp(8px,2.5vw,20px) clamp(12px,4.2vw,30px);
  position:relative;

  /* FONTE BASE responsiva — todos usam em */
  font-size:clamp(7px,1.8vw,14px);
}

/* Partículas */
.p{position:absolute;border-radius:50%;pointer-events:none}

/* Glow */
.glow{
  position:absolute;top:18%;left:18%;width:64%;height:58%;
  background:radial-gradient(ellipse,#3366FF14 0%,transparent 70%);
  filter:blur(clamp(14px,3vw,28px));
  pointer-events:none;
}

/* ZONA 1: badges topo */
.topo{
  display:flex;
  justify-content:space-between;
  align-items:center;
  height:clamp(22px,4.5vw,34px);
  flex-shrink:0;
  z-index:2;
  gap:clamp(4px,1vw,8px);
}
.badge-desc{
  background:linear-gradient(135deg,#002DAA,#004EEE);
  border:clamp(1px,.2vw,1.5px) solid #4477FF;
  border-radius:clamp(4px,.8vw,7px);
  padding:0 clamp(8px,1.95vw,14px);
  height:100%;
  display:flex;align-items:center;gap:clamp(3px,.7vw,7px);
  box-shadow:0 0 clamp(8px,1.5vw,14px) #3366FF55;
  flex-shrink:0;
  font-size:clamp(7px,1.35vw,10px);font-weight:900;color:#fff;
  letter-spacing:clamp(.5px,.2vw,1.5px);white-space:nowrap;
}
.badge-tp{
  background:rgba(0,0,0,.9);
  border:clamp(1px,.2vw,1.5px) solid #3366FF;
  border-radius:clamp(4px,.8vw,7px);
  padding:0 clamp(7px,1.7vw,12px);
  height:100%;
  display:flex;align-items:center;gap:clamp(3px,.6vw,6px);
  flex-shrink:0;
  font-size:clamp(7px,1.35vw,10px);font-weight:700;color:#4488FF;
  letter-spacing:clamp(.5px,.2vw,1px);white-space:nowrap;
}
.dot-c{
  width:clamp(5px,1vw,7px);height:clamp(5px,1vw,7px);
  border-radius:50%;background:#00FFCC;
  box-shadow:0 0 clamp(4px,.8vw,7px) #00FFCC;flex-shrink:0;
}

/* ZONA 2: Hz principal */
.meio{
  flex:1;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:clamp(3px,.7vw,8px);
  z-index:2;text-align:center;
}
.pre{font-size:1em;font-weight:700;color:#00CCFF;letter-spacing:clamp(1.5px,.5vw,3.5px);opacity:.92}
.hz{font-size:clamp(50px,13vw,100px);font-weight:900;line-height:1;color:#fff;
    text-shadow:0 0 clamp(20px,5vw,40px) #3366FF,0 0 clamp(40px,9vw,80px) #3366FF66;
    letter-spacing:clamp(-2px,-.3vw,-1px)}
.sub{font-size:clamp(12px,3.5vw,26px);font-weight:900;color:#6699FF;
     letter-spacing:clamp(1.5px,.6vw,4px)}

/* ZONA 3: chamada + barra */
.baixo{
  display:flex;flex-direction:column;
  align-items:center;gap:clamp(4px,.9vw,9px);
  flex-shrink:0;z-index:2;
}
.chamada{
  font-size:clamp(10px,2.3vw,18px);font-weight:900;color:#fff;
  text-align:center;text-shadow:0 0 clamp(8px,2vw,14px) #3366FF88;
  line-height:1.25;
}
.chamada span{color:#00CCFF}
.barra{
  display:flex;align-items:center;gap:clamp(5px,1vw,10px);
  background:rgba(0,0,0,.8);border:1px solid #3366FF2A;
  border-radius:clamp(50px,7vw,99px);
  padding:clamp(3px,.6vw,5px) clamp(8px,2vw,18px);
  flex-wrap:wrap;justify-content:center;
}
.dot-l{width:clamp(5px,1vw,8px);height:clamp(5px,1vw,8px);
        border-radius:50%;background:#00FFCC;
        box-shadow:0 0 clamp(4px,.8vw,8px) #00FFCC;flex-shrink:0}
.barra span{font-size:clamp(7px,1.4vw,11px);color:#00FFCC;font-weight:700;white-space:nowrap}
.barra .sep{color:#3366FF33;font-size:clamp(7px,1.4vw,12px)}
.barra .info{font-size:clamp(7px,1.4vw,11px);color:#6699FF;white-space:nowrap}
.barra .canal{font-size:clamp(6px,1.2vw,10px);color:#444;white-space:nowrap}
</style>
</head>
