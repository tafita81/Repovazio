<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><title>Chat Daniela Melhorado</title><style> #top-bar { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; padding: 10px 15px; background: #fff; border-bottom: 1px solid #ccc; } #model-selector { display: flex; align-items: center; gap: 10px; } #model-selector select { padding: 6px 10px; font-size: 16px; } #extra-buttons { display: flex; gap: 12px; } button { padding: 8px 14px; background: #007bff; border: none; border-radius: 5px; color: white; cursor: pointer; font-size: 15px; } button:hover { background: #0056b3; } #token-usage { font-weight: bold; margin-left: 15px; } #session-icon { width: 32px; height: 32px; background: #007bff; border-radius: 50%; color: white; font-weight: bold; font-size: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; margin-left: 15px; } #sessions-list { position: fixed; top: 60px; right: 15px; width: 300px; max-height: 400px; overflow-y: auto; background: white; border: 1px solid #ccc; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); padding: 10px; display: none; z-index: 1000; } #sessions-list h3 { margin-top: 0; } #sessions-list ul { list-style: none; padding: 0; } #sessions-list ul li { padding: 6px 8px; border-bottom: 1px solid #eee; cursor: pointer; } #sessions-list ul li:hover { background: #f0f0f0; } #terminal-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 2000; } #terminal-content { background: #1e1e1e; width: 600px; max-width: 90%; height: 400px; border-radius: 8px; display: flex; flex-direction: column; color: #eee; font-family: monospace; } #terminal-output { flex-grow: 1; padding: 10px; overflow-y: auto; white-space: pre-wrap; } #terminal-input { border: none; padding: 10px; font-size: 16px; background: #2d2d2d; color: #eee; outline: none; } #terminal-close { background: #ff4c4c; border: none; padding: 6px 12px; color: white; font-weight: bold; cursor: pointer; border-radius: 0 0 8px 8px; }</style></head><body><div id="top-bar"><div id="model-selector"><label for="model-select"><strong>Modelo:</strong></label><select id="model-select"><option value="gpt-4.1-mini" selected>gpt-4.1-mini</option><option value="groq">groq</option><option value="coherhe">coherhe</option><option value="claude">claude</option></select><span id="token-usage">Tokens usados: 0</span><div id="session-icon" title="Sessões antigas">S</div></div><div id="extra-buttons"><button id="btn-connectors">Conectores Extras</button><button id="btn-terminal">Terminal Remoto</button></div></div><div id="sessions-list"><h3>Sessões antigas</h3><ul id="sessions-ul"></ul></div><div id="terminal-modal"><div id="terminal-content"><div id="terminal-output"></div><input id="terminal-input" placeholder="Digite comando e pressione Enter" autofocus=""/><button id="terminal-close">Fechar Terminal</button></div></div><script>let currentModel = 'gpt-4.1-mini';let totalTokens = 0;let sessions = [];const modelSelect = document.getElementById('model-select');const tokenUsageSpan = document.getElementById('token-usage');const sessionIcon = document.getElementById('session-icon');const sessionsList = document.getElementById('sessions-list');const sessionsUl = document.getElementById('sessions-ul');const btnConnectors = document.getElementById('btn-connectors');const btnTerminal = document.getElementById('btn-terminal');const terminalModal = document.getElementById('terminal-modal');const terminalOutput = document.getElementById('terminal-output');const terminalInput = document.getElementById('terminal-input');const terminalClose = document.getElementById('terminal-close');modelSelect.addEventListener('change', () => {currentModel = modelSelect.value;console.log('Modelo selecionado:', currentModel);});function addTokens(count) {totalTokens += count;tokenUsageSpan.textContent = `Tokens usados: ${totalTokens}`;}function saveSkillToNotion(skillName) {console.log('Salvando skill no Notion:', skillName);}sessionIcon.addEventListener('click', () => {if (sessionsList.style.display === 'block') {sessionsList.style.display = 'none';} else {updateSessionsList();sessionsList.style.display = 'block';}});function updateSessionsList() {sessionsUl.innerHTML = '';if (sessions.length === 0) {const li = document.createElement('li');li.textContent = 'Nenhuma sessão salva';sessionsUl.appendChild(li);return;}sessions.forEach((sess, idx) => {const li = document.createElement('li');li.textContent = `Sessão ${idx + 1}: ${sess.name}`;li.title = sess.details;li.addEventListener('click', () => {alert(`Retomando sessão: ${sess.name}`);});sessionsUl.appendChild(li);});}btnConnectors.addEventListener('click', () => {alert('Aqui abriria lista de conectores extras para ativar/desativar.');});btnTerminal.addEventListener('click', () => {terminalModal.style.display = 'flex';terminalInput.focus();});terminalClose.addEventListener('click', () => {terminalModal.style.display = 'none';terminalOutput.textContent = '';terminalInput.value = '';});function execCommand(cmd) {return new Promise(resolve => {setTimeout(() => {resolve(`Comando executado: ${cmd}\nSaída simulada.`);}, 1000);});}terminalInput.addEventListener('keydown', async (e) => {if (e.key === 'Enter') {const cmd = terminalInput.value.trim();if (cmd === '') return;terminalOutput.textContent += `> ${cmd}\n`;terminalInput.value = '';const output = await execCommand(cmd);terminalOutput.textContent += output + '\n';terminalOutput.scrollTop = terminalOutput.scrollHeight;}});window.chatConfig = {getModel: () => currentModel,addTokens,saveSkillToNotion,sessions,};</script></body></html>
