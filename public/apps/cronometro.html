<html><head><title>Cronômetro</title><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"><style>body {background-color: #333;} .dark-mode {background-color: #333; color: #fff;}</style></head><body><div class="container"><h1>Cronômetro</h1><div id="timer" style="font-size: 48px;"></div><button id="start" class="btn btn-primary">Start</button><button id="stop" class="btn btn-secondary">Stop</button><button id="reset" class="btn btn-danger">Reset</button></div><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script><script>function startTimer() {let timer = document.getElementById("timer");let interval = setInterval(function() {timer.textContent = parseInt(timer.textContent) + 1}, 1000);document.getElementById("start").disabled = true;document.getElementById("stop").disabled = false;document.getElementById("reset").disabled = true;}function stopTimer() {clearInterval(interval);document.getElementById("start").disabled = false;document.getElementById("stop").disabled = true;document.getElementById("reset").disabled = false;}function resetTimer() {document.getElementById("timer").textContent = "0";document.getElementById("start").disabled = false;document.getElementById("stop").disabled = true;document.getElementById("reset").disabled = true;}document.getElementById("start").addEventListener("click", startTimer);document.getElementById("stop").addEventListener("click", stopTimer);document.getElementById("reset").addEventListener("click", resetTimer);}</script></body></html>
