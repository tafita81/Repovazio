<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Calculadora Científica Avançada</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono&display=swap');
  body {
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    font-family: 'Roboto Mono', monospace;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }
  .calculator {
    background: #1e2a38;
    border-radius: 15px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    width: 360px;
    max-width: 95vw;
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-gap: 15px;
  }
  .display {
    grid-column: span 5;
    background: #121b26;
    border-radius: 10px;
    padding: 20px;
    font-size: 1.8rem;
    text-align: right;
    overflow-x: auto;
    min-height: 60px;
    user-select: none;
  }
  button {
    background: #324a6e;
    border: none;
    border-radius: 10px;
    color: #e0e6f1;
    font-size: 1.2rem;
    cursor: pointer;
    transition: background 0.3s ease;
    box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    user-select: none;
  }
  button:hover {
    background: #4a6cae;
  }
  button:active {
    background: #1c2a45;
  }
  .operator {
    background: #f39c12;
    color: #121212;
  }
  .operator:hover {
    background: #d87e0a;
  }
  .operator:active {
    background: #b36a08;
  }
  .function {
    background: #2c3e50;
  }
  .function:hover {
    background: #3e566f;
  }
  .function:active {
    background: #263b4f;
  }
  .span-two {
    grid-column: span 2;
  }
  @media (max-width: 400px) {
    .calculator {
      width: 100%;
      grid-gap: 10px;
      padding: 15px;
    }
    .display {
      font-size: 1.4rem;
      padding: 15px;
      min-height: 50px;
    }
    button {
      font-size: 1rem;
      padding: 12px 0;
    }
  }
</style>
</head>
<body>
  <div class="calculator" role="application" aria-label="Calculadora Científica Avançada">
    <div class="display" id="display" aria-live="polite" aria-atomic="true">0</div>
    <button class="function" aria-label="Limpar tudo" id="clear">C</button>
    <button class="function" aria-label="Apagar último caractere" id="backspace">⌫</button>
    <button class="function" aria-label="Parênteses esquerda" id="paren-left">(</button>
    <button class="function" aria-label="Parênteses direita" id="paren-right">)</button>
    <button class="operator" aria-label="Divisão" data-value="/">÷</button>
    <button data-value="7">7</button>
    <button data-value="8">8</button>
    <button data-value="9">9</button>
    <button class="operator" aria-label="Multiplicação" data-value="*">×</button>
    <button class="function" aria-label="Fatorial" id="factorial">x!</button>
    <button data-value="4">4</button>
    <button data-value="5">5</button>
    <button data-value="6">6</button>
    <button class="operator" aria-label="Subtração" data-value="-">−</button>
    <button class="function" aria-label="Exponencial" id="exp">e^x</button>
    <button data-value="1">1</button>
    <button data-value="2">2</button>
    <button data-value="3">3</button>
    <button class="operator" aria-label="Adição" data-value="+">+</button>
    <button class="function" aria-label="Raiz quadrada" id="sqrt">√</button>
    <button data-value="0" class="span-two">0</button>
    <button data-value=".">.</button>
    <button class="operator" aria-label="Igual" id="equals">=</button>
    <button class="function" aria-label="Seno" id="sin">sin</button>
    <button class="function" aria-label="Cosseno" id="cos">cos</button>
    <button class="function" aria-label="Tangente" id="tan">tan</button>
    <button class="function" aria-label="Logaritmo base 10" id="log">log</button>
    <button class="function" aria-label="Logaritmo natural" id="ln">ln</button>
  </div>
<script>
  const display = document.getElementById('display');
  let expression = '';

  function updateDisplay() {
    display.textContent = expression || '0';
  }

  function safeEval(expr) {
    // Função para avaliar expressões matemáticas com funções científicas
    try {
      // Substituições para funções matemáticas
      let sanitized = expr
        .replace(/÷/g, '/')
        .replace(/×/g, '*')
        .replace(/−/g, '-')
        .replace(/\^/g, '**')
        .replace(/sin/g, 'Math.sin')
        .replace(/cos/g, 'Math.cos')
        .replace(/tan/g, 'Math.tan')
        .replace(/log/g, 'Math.log10')
        .replace(/ln/g, 'Math.log')
        .replace(/√/g, 'Math.sqrt')
        .replace(/e/g, 'Math.E')
        .replace(/π/g, 'Math.PI');

      // Função fatorial
      function factorial(n) {
        if (n < 0) return NaN;
        if (n === 0) return 1;
        let res = 1;
        for (let i = 1; i <= n; i++) res *= i;
        return res;
      }

      // Substituir fatorial (x!) por factorial(x)
      sanitized = sanitized.replace(/(\d+)!/g, (_, n) => factorial(parseInt(n)));

      // Avaliar a expressão
      return Function(`"use strict"; return (${sanitized})`)();
    } catch (e) {
      return 'Erro';
    }
  }

  document.querySelectorAll('button').forEach(button => {
    button.addEventListener('click', () => {
      const value = button.getAttribute('data-value');
      const id = button.id;

      if (id === 'clear') {
        expression = '';
      } else if (id === 'backspace') {
        expression = expression.slice(0, -1);
      } else if (id === 'equals') {
        const result = safeEval(expression);
        expression = result.toString();
      } else if (id === 'sin' || id === 'cos' || id === 'tan' || id === 'log' || id === 'ln' || id === 'sqrt' || id === 'exp' || id === 'factorial') {
        if (id === 'exp') {
          expression += 'Math.exp(';
        } else if (id === 'factorial') {
          expression += '!';
        } else {
          expression += id + '(';
        }
      } else if (id === 'paren-left' || id === 'paren-right') {
        expression += button.textContent;
      } else {
        expression += value;
      }
      updateDisplay();
    });
  });
</script>
</body>
</html>
