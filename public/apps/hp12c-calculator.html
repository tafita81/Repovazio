<!DOCTYPE html><html lang='pt'><head><meta charset='UTF-8'><title>Calculadora HP 12C</title><style>body { font-family: 'Courier New', monospace; background: #1e1e1e; color: #fff; padding: 20px; } .calculator { display: grid; grid-template-columns: repeat(5, 60px); gap: 10px; } .button { padding: 15px; font-size: 16px; border: none; border-radius: 5px; background: #333; color: #fff; cursor: pointer; } .button:active { background: #555; } .display { width: 300px; height: 40px; margin-bottom: 10px; text-align: right; font-size: 20px; padding: 10px; }</style></head><body><h1>Calculadora HP 12C</h1><input type='text' class='display' id='display' readonly><div class='calculator'><button class='button' onclick='clearDisplay()'>C</button><button class='button' onclick='appendValue('n')'>n</button><button class='button' onclick='appendValue('i')'>i</button><button class='button' onclick='appendValue('PV')'>PV</button><button class='button' onclick='appendValue('PMT')'>PMT</button><button class='button' onclick='appendValue('FV')'>FV</button><button class='button' onclick='appendValue('0')'>0</button><button class='button' onclick='appendValue('1')'>1</button><button class='button' onclick='appendValue('2')'>2</button><button class='button' onclick='appendValue('3')'>3</button><button class='button' onclick='appendValue('4')'>4</button><button class='button' onclick='appendValue('5')'>5</button><button class='button' onclick='appendValue('6')'>6</button><button class='button' onclick='appendValue('7')'>7</button><button class='button' onclick='appendValue('8')'>8</button><button class='button' onclick='appendValue('9')'>9</button><button class='button' onclick='appendValue('.')'>.</button><button class='button' onclick='calculateTVM()'>CPT</button><button class='button' onclick='appendValue('+')'>+</button><button class='button' onclick='appendValue('-')'>-</button><button class='button' onclick='appendValue('*')'>×</button><button class='button' onclick='appendValue('/')'>÷</button></div><script>function appendValue(val) { document.getElementById('display').value += val; } function clearDisplay() { document.getElementById('display').value = ''; } function calculateTVM() { // Implementação simplificada de TVM let n = parseFloat(document.getElementById('display').value); // Exemplo de cálculo simples document.getElementById('display').value = n * 1.05; }</script></body></html>
