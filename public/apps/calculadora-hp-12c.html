<html><head><title>Calculadora HP 12c</title></head><body><h1>Calculadora HP 12c</h1><form><input type='text' id='numero1' placeholder='Número 1'><br><input type='text' id='numero2' placeholder='Número 2'><br><select id='operacao'><option value='+'>+</option><option value='-'>-</option><option value='*'>*</option><option value='/'>/</option></select><br><button id='calcular'>Calcular</button><br><p id='resultado'></p></form><script>document.getElementById('calcular').addEventListener('click', function(){var num1 = parseFloat(document.getElementById('numero1').value);var num2 = parseFloat(document.getElementById('numero2').value);var operacao = document.getElementById('operacao').value;if(operacao === '+'){document.getElementById('resultado').innerHTML = num1 + num2;}else if(operacao === '-'){document.getElementById('resultado').innerHTML = num1 - num2;}else if(operacao === '*'){document.getElementById('resultado').innerHTML = num1 * num2;}else if(operacao === '/'){document.getElementById('resultado').innerHTML = num1 / num2;}});</script></body></html>
