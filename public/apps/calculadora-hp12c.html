<html><body><h1>Calculadora HP12C</h1><form><input type='number' id='PV' placeholder='PV'><br><input type='number' id='PMT' placeholder='PMT'><br><input type='number' id='N' placeholder='N'><br><input type='number' id='I' placeholder='I'><br><button onclick='calcular()'>Calcular</button></form><script>function calcular(){var PV = document.getElementById('PV').value;var PMT = document.getElementById('PMT').value;var N = document.getElementById('N').value;var I = document.getElementById('I').value;var FV = PV*(1+I)^N + PMT*((1+I)^N-1)/I;document.getElementById('resultado').innerHTML = 'FV: ' + FV.toFixed(2);}</script><p id='resultado'></p></body></html>
