<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Voto de Cores · Realtime</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:#0a0a0f;color:#f0f0f8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
.wrap{max-width:560px;margin:0 auto;padding:24px 16px}
h1{font-size:24px;font-weight:800;margin-bottom:6px;text-align:center}
.sub{color:#888;font-size:13px;text-align:center;margin-bottom:24px}
.total{text-align:center;margin-bottom:20px}
.total-n{font-size:42px;font-weight:900;color:#a78bfa;font-family:'SF Mono',monospace}
.total-l{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-top:4px}
.bars{background:#13131a;border:1px solid #252535;border-radius:14px;padding:18px;margin-bottom:18px}
.bar-row{margin-bottom:14px}
.bar-row:last-child{margin-bottom:0}
.bar-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:13px;font-weight:700}
.bar-pct{font-family:'SF Mono',monospace;color:#888}
.bar-bg{height:14px;background:#0a0a0f;border-radius:8px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:8px;transition:width 0.6s cubic-bezier(.2,.9,.3,1.4);min-width:4px}
.btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.btn{padding:18px 14px;border:none;border-radius:14px;font-size:15px;font-weight:800;cursor:pointer;color:#fff;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 14px rgba(0,0,0,0.3)}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(0,0,0,0.4)}
.btn:active{transform:scale(0.96)}
.btn:disabled{opacity:0.5;cursor:wait}
.btn-azul{background:linear-gradient(135deg,#3b82f6,#2563eb)}
.btn-verde{background:linear-gradient(135deg,#10b981,#059669)}
.btn-vermelho{background:linear-gradient(135deg,#ef4444,#dc2626)}
.btn-amarelo{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#0a0a0f}
.foot{text-align:center;font-size:11px;color:#55556a;margin-top:18px;line-height:1.6}
.foot strong{color:#a78bfa}
.live{display:inline-block;width:6px;height:6px;border-radius:50%;background:#22c55e;margin-right:5px;animation:pulse 1.5s infinite;vertical-align:middle}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#10a37f;color:#fff;padding:10px 20px;border-radius:22px;font-size:13px;font-weight:700;opacity:0;transition:all 0.3s;pointer-events:none;z-index:50}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
</style>
</head>
<body>
<div class="wrap">
  <h1>🎨 Voto de Cores</h1>
  <div class="sub"><span class="live"></span>App realtime · sincroniza entre todos os usuários</div>
  <div class="total"><div class="total-n" id="total">0</div><div class="total-l">votos totais</div></div>
  <div class="bars" id="bars">
    <div class="bar-row"><div class="bar-h"><span style="color:#3b82f6">🔵 Azul</span><span class="bar-pct" id="pct-azul">0% · 0</span></div><div class="bar-bg"><div class="bar-fill btn-azul" id="bar-azul" style="width:0%"></div></div></div>
    <div class="bar-row"><div class="bar-h"><span style="color:#10b981">🟢 Verde</span><span class="bar-pct" id="pct-verde">0% · 0</span></div><div class="bar-bg"><div class="bar-fill btn-verde" id="bar-verde" style="width:0%"></div></div></div>
    <div class="bar-row"><div class="bar-h"><span style="color:#ef4444">🔴 Vermelho</span><span class="bar-pct" id="pct-vermelho">0% · 0</span></div><div class="bar-bg"><div class="bar-fill btn-vermelho" id="bar-vermelho" style="width:0%"></div></div></div>
    <div class="bar-row"><div class="bar-h"><span style="color:#fbbf24">🟡 Amarelo</span><span class="bar-pct" id="pct-amarelo">0% · 0</span></div><div class="bar-bg"><div class="bar-fill btn-amarelo" id="bar-amarelo" style="width:0%"></div></div></div>
  </div>
  <div class="btns">
    <button class="btn btn-azul" onclick="vote('azul')">🔵 Azul</button>
    <button class="btn btn-verde" onclick="vote('verde')">🟢 Verde</button>
    <button class="btn btn-vermelho" onclick="vote('vermelho')">🔴 Vermelho</button>
    <button class="btn btn-amarelo" onclick="vote('amarelo')">🟡 Amarelo</button>
  </div>
  <div class="foot">Backend <strong>24/7</strong> Supabase · atualiza a cada 3s · funciona com browser fechado</div>
</div>
<div class="toast" id="toast"></div>
<script>
const API = "https://tpjvalzwkqwttvmszvie.supabase.co/functions/v1/app-runtime/voto-cores/api";
let busy = false;

function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.className="toast show";setTimeout(function(){t.className="toast";},2000);}

async function vote(color){
  if(busy) return;
  busy = true;
  try{
    const r = await fetch(API, {method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({action:"create", data:{cor:color, ts:Date.now()}})});
    const d = await r.json();
    if(d.ok){ toast("✅ Voto em "+color); load(); }
    else toast("❌ Falhou");
  }catch(e){ toast("❌ "+e.message); }
  busy = false;
}

async function load(){
  try{
    const r = await fetch(API+"?action=list&limit=1000");
    const d = await r.json();
    const items = d.items || [];
    const counts = {azul:0, verde:0, vermelho:0, amarelo:0};
    items.forEach(function(it){ const c = it.data && it.data.cor; if(counts[c] !== undefined) counts[c]++; });
    const total = counts.azul + counts.verde + counts.vermelho + counts.amarelo;
    document.getElementById("total").textContent = total;
    ["azul","verde","vermelho","amarelo"].forEach(function(c){
      const n = counts[c];
      const pct = total > 0 ? (n*100/total).toFixed(1) : 0;
      document.getElementById("pct-"+c).textContent = pct+"% · "+n;
      document.getElementById("bar-"+c).style.width = (total>0?pct:0)+"%";
    });
  }catch(e){}
}
load();
setInterval(load, 3000);
</script>
</body>
</html>
