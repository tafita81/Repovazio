<!DOCTYPE html><html><head><title>Calculadora Avançada</title></head><body><h1>Calculadora Avançada</h1><form id="form"><input type="number" id="numero1" placeholder="Número 1"><select id="operador"><option value="+">+</option><option value="-">-</option><option value="*">*</option><option value="/">/</option><option value="^">^</option></select><input type="number" id="numero2" placeholder="Número 2"><button type="submit">Calcular</button></form><p id="resultado"></p><script>const form = document.getElementById('form');form.addEventListener('submit', (event) => {event.preventDefault();const num1 = parseFloat(document.getElementById('numero1').value);const operador = document.getElementById('operador').value;const num2 = parseFloat(document.getElementById('numero2').value);let resultado;switch (operador) {case '+':resultado = num1 + num2;break;case '-':resultado = num1 - num2;break;case '*':resultado = num1 * num2;break;case '/':if (num2 !== 0) {resultado = num1 / num2;} else {resultado = 'Erro: Divisão por zero!';}break;case '^':resultado = Math.pow(num1, num2);break;}document.getElementById('resultado').innerHTML = `Resultado: ${resultado}`;});</script></body></html>
