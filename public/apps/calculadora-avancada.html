<!DOCTYPE html><html><head><title>Calculadora Científica</title><style>body{background:#121212;color:#00ff99;font-family:Segoe UI}.dark-mode{background:#1e1e1e}.calculator{max-width:400px;margin:50px auto;padding:20px;border-radius:10px;box-shadow:0 0 20px #00ff9922}.button{width:60px;height:60px;margin:5px;font-size:1.2em}</style></head><body><div class="calculator"><h2>Calculadora Científica</h2><input type="text" id="display" disabled><div id="buttons"></div><button onclick="toggleDarkMode()">Modo Escuro</button></div><script>function createButton(text,callback){const btn=document.createElement('button');btn.textContent=text;btn.className='button';btn.onclick=callback;return btn}function initCalculator(){const display=document.getElementById('display');const buttons=document.getElementById('buttons');buttons.innerHTML='';// Números e operações básicasfor(let i=0;i<=9;i++){buttons.appendChild(createButton(i,()=>display.value+=i));}buttons.appendChild(createButton('+',()=>display.value+='+'));buttons.appendChild(createButton('-',()=>display.value+='-'));buttons.appendChild(createButton('*',()=>display.value+='*'));buttons.appendChild(createButton('/',()=>display.value+='/'));buttons.appendChild(createButton('=',()=>{try{display.value=eval(display.value)}catch(e){display.value='Erro'}}));buttons.appendChild(createButton('C',()=>display.value=''));// Funções científicasbuttons.appendChild(createButton('√',()=>display.value+='Math.sqrt('));buttons.appendChild(createButton('x²',()=>display.value+='**2'));buttons.appendChild(createButton('%',()=>display.value+='*0.01'));buttons.appendChild(createButton('1/x',()=>display.value+='1/'));buttons.appendChild(createButton('sin',()=>display.value+='Math.sin('));buttons.appendChild(createButton('cos',()=>display.value+='Math.cos('));buttons.appendChild(createButton('tan',()=>display.value+='Math.tan('));}function toggleDarkMode(){document.body.classList.toggle('dark-mode');}</script></body></html>
