<html><body><h1>Calculadora</h1><form><input type='number' id='num1'><input type='number' id='num2'><select id='op'><option value='+'>+</option><option value='-'>-</option><option value='*'>*</option><option value='/'>/</option></select><button onclick='calcular()'>Calcular</button></form><p id='resultado'></p><script>function calcular(){var num1=document.getElementById('num1').value;var num2=document.getElementById('num2').value;var op=document.getElementById('op').value;var resultado;switch(op){case '+':resultado=num1+num2;break;case '-':resultado=num1-num2;break;case '*':resultado=num1*num2;break;case '/':if(num2!=0)resultado=num1/num2;else resultado='Erro';break;}document.getElementById('resultado').innerHTML='Resultado: '+resultado;}</script></body></html>
