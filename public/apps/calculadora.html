<html><head><title>Calculadora HP12C</title><style>body { font-family: monospace; background: #111; color: #0f0; } .display { font-size: 2em; padding: 20px; } .buttons { display: grid; grid-template-columns: repeat(5, 60px); gap: 10px; padding: 20px; } button { padding: 15px; font-size: 1.2em; background: #222; border: 1px solid #0f0; } </style></head><body><div class='display' id='display'></div><div class='buttons'><button onclick='calc("1")'>1</button><button onclick='calc("2")'>2</button><button onclick='calc("3")'>3</button><button onclick='calc("+")'>+</button><button onclick='calc("C")'>C</button><button onclick='calc("4")'>4</button><button onclick='calc("5")'>5</button><button onclick='calc("6")'>6</button><button onclick='calc("-")'>−</button><button onclick='calc("="'>=</button><button onclick='calc("7")'>7</button><button onclick='calc("8")'>8</button><button onclick='calc("9")'>9</button><button onclick='calc("*")'>×</button><button onclick='calc("0")'>0</button><button onclick='calc(".")'>.</button><button onclick='calc("/")'>÷</button><button onclick='calc("%")'>%</button><button onclick='calc("TVM")'>TVM</button></div><script>let display = document.getElementById('display'); let expr = ''; function calc(op) { if (op === 'C') { expr = ''; } else if (op === 'TVM') { expr = 'TVM: PV=1000, FV=0, N=12, I/Y=5'; } else { expr += op; } display.textContent = expr; }</script></body></html>
