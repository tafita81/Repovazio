<html><body><h1>Calculadora</h1><input id="num1" type="number" placeholder="Número 1"><br><input id="num2" type="number" placeholder="Número 2"><br><button onclick="calc()">Calcular</button><p id="resultado"></p><script>function calc(){var num1 = document.getElementById("num1").value;var num2 = document.getElementById("num2").value;document.getElementById("resultado").innerHTML = parseInt(num1) + parseInt(num2);}</script></body></html>
