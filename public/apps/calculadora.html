<html><head><title>Calculadora</title></head><body><h1>Calculadora</h1><form><input type='number' id='num1' placeholder='Número 1'><br><input type='number' id='num2' placeholder='Número 2'><br><select id='operacao'><option value='+'>+</option><option value='-'>-</option><option value='*'>*</option><option value='/'>/</option></select><br><button type='submit'>Calcular</button><br><p id='resultado'></p></form><script>document.addEventListener('DOMContentLoaded', function() {const form = document.querySelector('form');form.addEventListener('submit', function(event) {event.preventDefault();const num1 = parseFloat(document.getElementById('num1').value);const num2 = parseFloat(document.getElementById('num2').value);const operacao = document.getElementById('operacao').value;if (operacao === '+') {document.getElementById('resultado').innerHTML = num1 + num2;} else if (operacao === '-') {document.getElementById('resultado').innerHTML = num1 - num2;} else if (operacao === '*') {document.getElementById('resultado').innerHTML = num1 * num2;} else if (operacao === '/') {document.getElementById('resultado').innerHTML = num1 / num2;}});});</script></body></html>
